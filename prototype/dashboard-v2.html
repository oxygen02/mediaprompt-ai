<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MediaPrompt AI - 工作台</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif; }
    
    body {
      background: rgba(248, 249, 250, 0.8);
    }
    
    .sidebar {
      background: rgba(255, 255, 255, 0.8);
      border-right: 1px solid rgba(0, 0, 0, 0.06);
    }
    
    .nav-item:hover {
      background: rgba(0, 0, 0, 0.04);
    }
    .nav-item.active {
      background: rgba(0, 0, 0, 0.04);
    }
    
    .card {
      background: rgba(255, 255, 255, 0.8);
      border: 1px solid rgba(0, 0, 0, 0.06);
    }
    
    .project-card {
      background: rgba(255, 255, 255, 0.8);
      border: 1px solid rgba(0, 0, 0, 0.06);
    }
    .project-card:hover {
      border-color: rgba(0, 0, 0, 0.1);
    }
    
    .btn-primary {
      background: #6366f1;
    }
    .btn-primary:hover {
      background: #4f46e5;
    }
  </style>
</head>
<body class="bg-gray-50/80">
  
  <div class="flex min-h-screen">
    
    <!-- 左侧导航 -->
    <aside class="sidebar w-52 flex flex-col">
      
      <!-- 用户信息 -->
      <div class="p-4 border-b border-gray-200/50">
        <div class="flex items-center gap-2.5">
          <div class="w-8 h-8 rounded-full bg-gray-200 flex items-center justify-center">
            <span class="text-gray-600 text-sm font-medium">U</span>
          </div>
          <div>
            <p class="text-sm font-medium text-gray-900">用户名</p>
            <p class="text-xs text-gray-500">Pro 会员</p>
          </div>
        </div>
      </div>
      
      <!-- 导航 -->
      <nav class="flex-1 p-2">
        <a href="index-v9.html" class="nav-item flex items-center gap-2.5 px-3 py-2 rounded text-sm text-gray-600">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 4v16m8-8H4"/>
          </svg>
          <span>创建分析</span>
        </a>
        <a href="#" class="nav-item active flex items-center gap-2.5 px-3 py-2 rounded text-sm text-gray-900 font-medium">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6z"/>
          </svg>
          <span>仪表盘</span>
        </a>
        <a href="#" class="nav-item flex items-center gap-2.5 px-3 py-2 rounded text-sm text-gray-600">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
          </svg>
          <span>历史记录</span>
        </a>
        <a href="#" class="nav-item flex items-center gap-2.5 px-3 py-2 rounded text-sm text-gray-600">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/>
          </svg>
          <span>收藏夹</span>
        </a>
      </nav>
      
      <!-- 底部用量 -->
      <div class="p-4 border-t border-gray-200/50">
        <div class="text-xs text-gray-500 mb-1.5">今日用量</div>
        <div class="flex items-center justify-between text-xs mb-1.5">
          <span class="text-gray-500">剩余</span>
          <span class="text-gray-700">97/100</span>
        </div>
        <div class="h-1 bg-gray-200 rounded-full overflow-hidden">
          <div class="h-full bg-gray-400 rounded-full" style="width: 97%"></div>
        </div>
      </div>
      
    </aside>

    <!-- 主内容 -->
    <main class="flex-1 flex flex-col">
      
      <!-- 顶部 -->
      <header class="h-14 border-b border-gray-200/50 flex items-center justify-between px-6 bg-white/50">
        <div class="flex items-center gap-4 flex-1">
          <div class="relative flex-1 max-w-sm">
            <svg class="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
            </svg>
            <input type="text" placeholder="搜索..." class="w-full pl-9 pr-3 py-1.5 bg-white/80 border border-gray-200/50 rounded text-sm text-gray-700 placeholder-gray-400 focus:outline-none">
          </div>
        </div>
        <button class="btn-primary px-4 py-1.5 rounded text-sm text-white">
          + 新建
        </button>
      </header>
      
      <!-- 内容 -->
      <div class="flex-1 p-6 overflow-auto">
        
        <div class="mb-6">
          <h1 class="text-lg font-medium text-gray-900">工作台</h1>
          <p class="text-sm text-gray-500">查看分析历史</p>
        </div>
        
        <!-- 项目列表 -->
        <div class="grid grid-cols-3 gap-4">
          
          <div class="project-card rounded-lg overflow-hidden cursor-pointer">
            <div class="aspect-video bg-gray-100 flex items-center justify-center">
              <span class="text-3xl">📝</span>
            </div>
            <div class="p-3">
              <h3 class="text-sm font-medium text-gray-900 mb-0.5 truncate">电商产品文案分析</h3>
              <div class="flex items-center justify-between text-xs text-gray-500">
                <span>文字</span>
                <span>2小时前</span>
              </div>
            </div>
          </div>
          
          <div class="project-card rounded-lg overflow-hidden cursor-pointer">
            <div class="aspect-video bg-gray-100 flex items-center justify-center">
              <span class="text-3xl">🖼️</span>
            </div>
            <div class="p-3">
              <h3 class="text-sm font-medium text-gray-900 mb-0.5 truncate">AI 风格图片提示词</h3>
              <div class="flex items-center justify-between text-xs text-gray-500">
                <span>图片</span>
                <span>昨天</span>
              </div>
            </div>
          </div>
          
          <div class="project-card rounded-lg overflow-hidden cursor-pointer">
            <div class="aspect-video bg-gray-100 flex items-center justify-center">
              <span class="text-3xl">🎬</span>
            </div>
            <div class="p-3">
              <h3 class="text-sm font-medium text-gray-900 mb-0.5 truncate">抖音广告视频拆解</h3>
              <div class="flex items-center justify-between text-xs text-gray-500">
                <span>视频</span>
                <span>3天前</span>
              </div>
            </div>
          </div>
          
          <div class="project-card rounded-lg overflow-hidden cursor-pointer">
            <div class="aspect-video bg-gray-100 flex items-center justify-center">
              <span class="text-3xl">🌐</span>
            </div>
            <div class="p-3">
              <h3 class="text-sm font-medium text-gray-900 mb-0.5 truncate">YouWare 风格分析</h3>
              <div class="flex items-center justify-between text-xs text-gray-500">
                <span>网页</span>
                <span>1周前</span>
              </div>
            </div>
          </div>
          
          <!-- 新建 -->
          <div class="project-card rounded-lg overflow-hidden cursor-pointer flex items-center justify-center min-h-[140px] border-dashed hover:border-solid hover:border-gray-400">
            <div class="text-center">
              <svg class="w-6 h-6 text-gray-400 mx-auto mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 4v16m8-8H4"/>
              </svg>
              <p class="text-xs text-gray-400">新建分析</p>
            </div>
          </div>
          
        </div>
        
      </div>
      
    </main>
    
  </div>

</body>
</html>
