<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MediaPrompt AI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif; }
    
    body {
      background: #ffffff;
      min-height: 100vh;
    }
    
    .sidebar {
      background: #fafafa;
      border-right: 1px solid #f0f0f0;
    }
    
    .nav-item {
      transition: all 0.15s ease;
    }
    .nav-item:hover {
      background: #f5f5f5;
    }
    .nav-item.active {
      background: #f0f0f0;
    }
    
    .hero-input {
      background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
      border: 1px solid #e9ecef;
    }
    
    .btn-primary {
      background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
    }
    
    .type-card {
      transition: all 0.2s ease;
    }
    .type-card:hover {
      border-color: #6366f1;
    }
    
    /* 反转钟表动画 */
    @keyframes rotateReverse {
      from { transform: rotate(0deg); }
      to { transform: rotate(-360deg); }
    }
    .clock-reverse {
      animation: rotateReverse 10s linear infinite;
    }
  </style>
</head>
<body class="bg-white">
  
  <div class="flex min-h-screen">
    
    <!-- 左侧导航栏 -->
    <aside class="sidebar w-52 flex-shrink-0 flex flex-col">
      
      <!-- Logo -->
      <div class="p-4 border-b border-gray-100">
        <div class="flex items-center gap-2">
          <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-violet-500 to-purple-600 flex items-center justify-center">
            <span class="text-white font-bold text-sm">M</span>
          </div>
          <span class="font-semibold text-gray-900">MediaPrompt</span>
        </div>
      </div>
      
      <!-- 导航菜单 -->
      <nav class="flex-1 p-3">
        <div class="text-xs text-gray-400 px-3 py-2">分析工具</div>
        <a href="#" class="nav-item active flex items-center gap-2.5 px-3 py-2.5 rounded-lg text-sm text-gray-700">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
          </svg>
          文字分析
        </a>
        <a href="#" class="nav-item flex items-center gap-2.5 px-3 py-2.5 rounded-lg text-sm text-gray-500">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
          </svg>
          图片分析
        </a>
        <a href="#" class="nav-item flex items-center gap-2.5 px-3 py-2.5 rounded-lg text-sm text-gray-500">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"/>
          </svg>
          视频分析
        </a>
        <a href="#" class="nav-item flex items-center gap-2.5 px-3 py-2.5 rounded-lg text-sm text-gray-500">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9"/>
          </svg>
          网页分析
        </a>
        
        <div class="text-xs text-gray-400 px-3 py-2 mt-4">个人中心</div>
        <a href="#" class="nav-item flex items-center gap-2.5 px-3 py-2.5 rounded-lg text-sm text-gray-500">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
          </svg>
          历史记录
        </a>
        <a href="#" class="nav-item flex items-center gap-2.5 px-3 py-2.5 rounded-lg text-sm text-gray-500">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
          </svg>
          设置
        </a>
      </nav>
      
      <!-- 底部用户信息 -->
      <div class="p-4 border-t border-gray-100">
        <div class="flex items-center gap-2.5">
          <div class="w-8 h-8 rounded-full bg-gray-200 flex items-center justify-center">
            <span class="text-xs text-gray-600">U</span>
          </div>
          <div class="flex-1 min-w-0">
            <p class="text-sm text-gray-700 truncate">用户名</p>
            <p class="text-xs text-gray-400">免费用户</p>
          </div>
        </div>
      </div>
      
    </aside>

    <!-- 主内容区 -->
    <main class="flex-1 flex flex-col">
      
      <!-- 顶部工具栏 -->
      <header class="h-14 border-b border-gray-100 flex items-center justify-between px-6 bg-white">
        <div class="flex items-center gap-4">
          <span class="text-sm text-gray-400">分析模式：</span>
          <button class="px-3 py-1.5 bg-gray-100 rounded text-sm text-gray-700 font-medium">文字</button>
          <button class="px-3 py-1.5 rounded text-sm text-gray-500 hover:bg-gray-50">图片</button>
          <button class="px-3 py-1.5 rounded text-sm text-gray-500 hover:bg-gray-50">视频</button>
          <button class="px-3 py-1.5 rounded text-sm text-gray-500 hover:bg-gray-50">网页</button>
        </div>
        <button class="btn-primary px-4 py-2 rounded-lg text-sm text-white font-medium">
          升级 Pro
        </button>
      </header>

      <!-- 主内容 -->
      <div class="flex-1 flex flex-col items-center justify-center p-8">
        <div class="max-w-2xl w-full">
          
          <!-- 标题 -->
          <div class="text-center mb-10">
            <div class="flex items-center justify-center gap-4 mb-4">
              <!-- 反转钟表动态图 -->
              <div class="clock-reverse w-16 h-16 text-violet-500">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                  <circle cx="12" cy="12" r="10"/>
                  <path d="M12 6v6l4 2"/>
                  <circle cx="12" cy="12" r="1.5" fill="currentColor"/>
                </svg>
              </div>
              <h1 class="text-4xl font-bold text-gray-900">
                最好的学习从模仿开始
              </h1>
            </div>
            <p class="text-base text-gray-500">
              上传你喜欢的内容，提炼有效提示词，让美好可以复刻迭代
            </p>
          </div>
          
          <!-- 核心输入区 -->
          <div class="mb-8">
            <div class="hero-input rounded-2xl p-3">
              <div class="flex gap-2">
                <select class="px-4 py-3 bg-white border border-gray-200 rounded-xl text-sm text-gray-700 focus:outline-none" id="typeSelect">
                  <option value="text">📝 文字分析</option>
                  <option value="image">🖼️ 图片分析</option>
                  <option value="video">🎬 视频分析</option>
                  <option value="website">🌐 网页分析</option>
                </select>
                <input 
                  type="text" 
                  id="mainInput"
                  placeholder="拖放文件或粘贴链接..." 
                  class="flex-1 px-4 py-3 bg-transparent text-gray-900 placeholder-gray-400 text-base focus:outline-none"
                >
                <button class="btn-primary px-8 py-3 rounded-xl text-white font-medium whitespace-nowrap">
                  开始分析
                </button>
              </div>
            </div>
            <p class="text-center text-sm text-gray-400 mt-3">
              无需信用卡 · 每天免费3次
            </p>
          </div>
          
          <!-- 功能说明 - 横向一行 -->
          <div class="flex gap-6 justify-center flex-wrap">
            <div class="text-center p-4 min-w-[140px]">
              <div class="w-12 h-12 bg-violet-100 rounded-xl flex items-center justify-center mx-auto mb-3">
                <span class="text-xl">📝</span>
              </div>
              <h3 class="font-medium text-gray-900 mb-1">文字分析</h3>
              <p class="text-xs text-gray-500">文案/小说/策划书</p>
            </div>
            <div class="text-center p-4 min-w-[140px]">
              <div class="w-12 h-12 bg-pink-100 rounded-xl flex items-center justify-center mx-auto mb-3">
                <span class="text-xl">🖼️</span>
              </div>
              <h3 class="font-medium text-gray-900 mb-1">图片分析</h3>
              <p class="text-xs text-gray-500">AI图/照片/海报</p>
            </div>
            <div class="text-center p-4 min-w-[140px]">
              <div class="w-12 h-12 bg-blue-100 rounded-xl flex items-center justify-center mx-auto mb-3">
                <span class="text-xl">🎬</span>
              </div>
              <h3 class="font-medium text-gray-900 mb-1">视频分析</h3>
              <p class="text-xs text-gray-500">短视频/广告/特效</p>
            </div>
            <div class="text-center p-4 min-w-[140px]">
              <div class="w-12 h-12 bg-green-100 rounded-xl flex items-center justify-center mx-auto mb-3">
                <span class="text-xl">🌐</span>
              </div>
              <h3 class="font-medium text-gray-900 mb-1">网页分析</h3>
              <p class="text-xs text-gray-500">URL/截图/需求</p>
            </div>
          </div>
          
        </div>
      </div>

    </main>
    
  </div>

  <script>
    const typeSelect = document.getElementById('typeSelect');
    const mainInput = document.getElementById('mainInput');
    const hints = {
      text: '支持 Word/PDF/TXT/Markdown，拖放或粘贴链接',
      image: '支持 JPG/PNG/WebP，拖放或粘贴图片链接',
      video: '支持 MP4/MOV，≤30秒，拖放或粘贴链接',
      website: '粘贴网页URL或上传网页截图'
    };
    
    typeSelect.addEventListener('change', function() {
      mainInput.placeholder = hints[this.value] || '拖放文件或粘贴链接...';
    });
  </script>

</body>
</html>
