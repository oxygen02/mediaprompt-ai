<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MediaPrompt AI - Content Reverse Engineering Toolkit</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif; }
    
    body {
      background: #f5f5f7;
      min-height: 100vh;
    }
    
    .sidebar {
      background: #ffffff;
      border-right: 1px solid #e5e5e5;
    }
    
    .nav-item {
      transition: all 0.15s ease;
    }
    .nav-item:hover {
      background: #f5f5f7;
    }
    .nav-item.active {
      background: #e8e8ed;
    }
    
    .upload-zone {
      background: #ffffff;
      border: 2px dashed #d1d1d6;
      transition: all 0.2s ease;
    }
    .upload-zone:hover {
      border-color: #6366f1;
      background: #fafafa;
    }
    
    .btn-primary {
      background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
    }
    
    .btn-secondary {
      background: #ffffff;
      border: 1px solid #d1d1d6;
    }
    .btn-secondary:hover {
      background: #f5f5f7;
    }
    
    .checkbox-item {
      background: #ffffff;
      border: 1px solid #e5e5e5;
      transition: all 0.15s ease;
    }
    .checkbox-item:hover {
      border-color: #c7c7cc;
    }
    .checkbox-item.checked {
      border-color: #6366f1;
      background: rgba(99, 102, 241, 0.05);
    }
    
    .output-card {
      background: #ffffff;
      border: 1px solid #e5e5e5;
    }
    
    .lang-btn {
      transition: all 0.15s ease;
    }
    .lang-btn.active {
      background: #6366f1;
      color: white;
    }
    
    /* 月食动画 - 更小更黑 */
    @keyframes lunarEclipse {
      0% { 
        box-shadow: inset 0 0 0 0 rgba(20,20,20,0);
        transform: rotate(0deg);
      }
      25% { 
        box-shadow: inset 12px 0 0 0 rgba(20,20,20,0.5);
      }
      50% { 
        box-shadow: inset 20px 0 0 0 rgba(20,20,20,0.85);
      }
      75% { 
        box-shadow: inset 12px 0 0 0 rgba(20,20,20,0.5);
      }
      100% { 
        box-shadow: inset 0 0 0 0 rgba(20,20,20,0);
        transform: rotate(360deg);
      }
    }
    .moon-eclipse {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: linear-gradient(135deg, #d4d4d8 0%, #a1a1aa 50%, #71717a 100%);
      animation: lunarEclipse 8s ease-in-out infinite;
      position: relative;
    }
    .moon-eclipse::before {
      content: '';
      position: absolute;
      top: 5px;
      left: 8px;
      width: 5px;
      height: 5px;
      background: rgba(0,0,0,0.15);
      border-radius: 50%;
    }
    .moon-eclipse::after {
      content: '';
      position: absolute;
      bottom: 8px;
      right: 6px;
      width: 7px;
      height: 7px;
      background: rgba(0,0,0,0.1);
      border-radius: 50%;
    }
    
    .hidden { display: none !important; }
  </style>
</head>
<body class="bg-[#f5f5f7] text-gray-800">

          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">

          <a href="#" class="text-sm text-gray-800 font-medium" data-i18n="nav.home">首页</a>
          <a href="#" class="text-sm text-gray-500" data-i18n="nav.pricing">定价</a>

          </div>
          <!-- 3. 小Slogan -->
          <p class="text-gray-500 text-base" data-i18n="slogan.sub">上传你喜欢的内容，提炼有效提示词，让美好可以复刻迭代</p>
        </div>
        
        <!-- 4. 类别选择 -->
        <div class="flex gap-3 mb-6 justify-center">

          </button>
          <button class="category-btn px-5 py-2 rounded-lg text-sm text-gray-500 bg-white border border-gray-200 hover:border-gray-300" data-type="video">

          </button>
          <button class="category-btn px-5 py-2 rounded-lg text-sm text-gray-500 bg-white border border-gray-200 hover:border-gray-300" data-type="website">
            <span data-i18n="category.website">🌐 网页</span>
          </button>
        </div>

            </svg>
          </div>
          <p class="text-gray-600 mb-1" data-i18n="upload.drag">拖放文件到此处</p>
          <p class="text-gray-400 text-sm" id="fileHint" data-i18n="upload.hint.document">支持 Word/PDF/TXT/Markdown</p>
        </div>

          <input type="file" id="fileInput" class="hidden">
          <button onclick="document.getElementById('fileInput').click()" class="btn-secondary flex-1 py-3 rounded-xl text-sm text-gray-600 font-medium shadow-sm">

            <span data-i18n="upload.analyze">🔍 开始分析提炼</span>
          </button>
        </div>

          <h3 class="text-sm font-medium text-gray-600 mb-3" data-i18n="output.title">希望输出的内容（可多选）</h3>
          
          <!-- 文档选项 -->

            <label class="checkbox-item checked rounded-lg p-3 cursor-pointer flex items-center gap-2">

              <span class="text-sm text-gray-600" data-i18n="doc.prompt">提示词</span>

            <label class="checkbox-item rounded-lg p-3 cursor-pointer flex items-center gap-2">
              <input type="checkbox" class="w-4 h-4 rounded bg-white border-gray-300 text-violet-500">

            <label class="checkbox-item rounded-lg p-3 cursor-pointer flex items-center gap-2">

            <label class="checkbox-item rounded-lg p-3 cursor-pointer flex items-center gap-2">
              <input type="checkbox" class="w-4 h-4 rounded bg-white border-gray-300 text-violet-500">
              <span class="text-sm text-gray-600" data-i18n="doc.variants">改编方案</span>

            <label class="checkbox-item rounded-lg p-3 cursor-pointer flex items-center gap-2">
              <input type="checkbox" class="w-4 h-4 rounded bg-white border-gray-300 text-violet-500">
              <span class="text-sm text-gray-600" data-i18n="vid.tools">推荐工具</span>
            </label>
          </div>

          <div id="websiteOptions" class="hidden grid grid-cols-4 gap-3">

              <input type="checkbox" checked class="w-4 h-4 rounded bg-white border-gray-300 text-violet-500">

            </label>
            <label class="checkbox-item rounded-lg p-3 cursor-pointer flex items-center gap-2">
              <input type="checkbox" class="w-4 h-4 rounded bg-white border-gray-300 text-violet-500">

            </label>
            <label class="checkbox-item rounded-lg p-3 cursor-pointer flex items-center gap-2">
              <input type="checkbox" class="w-4 h-4 rounded bg-white border-gray-300 text-violet-500">
              <span class="text-sm text-gray-600" data-i18n="web.features">功能列表</span>
            </label>
            <label class="checkbox-item rounded-lg p-3 cursor-pointer flex items-center gap-2">
              <input type="checkbox" class="w-4 h-4 rounded bg-white border-gray-300 text-violet-500">
              <span class="text-sm text-gray-600" data-i18n="web.layout">布局结构</span>
            </label>
            <label class="checkbox-item rounded-lg p-3 cursor-pointer flex items-center gap-2">
              <input type="checkbox" class="w-4 h-4 rounded bg-white border-gray-300 text-violet-500">
              <span class="text-sm text-gray-600" data-i18n="web.style">风格描述</span>
            </label>
            <label class="checkbox-item rounded-lg p-3 cursor-pointer flex items-center gap-2">
              <input type="checkbox" class="w-4 h-4 rounded bg-white border-gray-300 text-violet-500">
              <span class="text-sm text-gray-600" data-i18n="web.typography">字体配色</span>
            </label>
            <label class="checkbox-item rounded-lg p-3 cursor-pointer flex items-center gap-2">
              <input type="checkbox" class="w-4 h-4 rounded bg-white border-gray-300 text-violet-500">
              <span class="text-sm text-gray-600" data-i18n="web.mvp">MVP文档</span>
            </label>
            <label class="checkbox-item rounded-lg p-3 cursor-pointer flex items-center gap-2">
              <input type="checkbox" class="w-4 h-4 rounded bg-white border-gray-300 text-violet-500">
              <span class="text-sm text-gray-600" data-i18n="web.tech">技术栈推测</span>
            </label>
          </div>
        </div>
        
        <!-- 8. 输出结果展示区 + 一键复制 -->
        <div class="mb-6">
          <div class="flex items-center justify-between mb-3">
            <h3 class="text-sm font-medium text-gray-600" data-i18n="result.title">输出结果</h3>
            <button class="text-sm text-violet-500 hover:text-violet-600 flex items-center gap-1" id="copyBtn">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/>
              </svg>
              <span data-i18n="result.copy">一键复制</span>
            </button>
          </div>
          
          <div class="output-card rounded-xl p-5 shadow-sm" id="outputArea">
            <p class="text-gray-400 text-sm" data-i18n="result.waiting">分析结果将显示在这里...</p>
          </div>
        </div>
        
        <!-- 9. 用户编辑区 -->
        <div class="mb-6">
          <h3 class="text-sm font-medium text-gray-600 mb-3" data-i18n="editor.title">编辑修改（可选）</h3>
          <textarea class="w-full h-32 bg-white border border-gray-200 rounded-xl p-4 text-sm text-gray-600 placeholder-gray-400 focus:outline-none focus:border-violet-500" data-i18n-placeholder="editor.placeholder" placeholder="在这里修改提示词或添加你的想法..." id="editorArea"></textarea>
        </div>
        
        <!-- 10. 模拟输出按钮 + 模型选择 + 生成数量 -->
        <div class="flex gap-3 mb-8 items-center flex-wrap">
          <button class="btn-secondary py-3 px-6 rounded-xl text-sm text-gray-600 font-medium shadow-sm" id="previewBtn">
            <span data-i18n="editor.preview">🎲 模拟输出预览</span>
          </button>
          
          <!-- 模型选择 -->
          <div class="flex items-center gap-2">
            <span class="text-sm text-gray-500" data-i18n="model.label">模型：</span>
            <select id="modelSelect" class="bg-white border border-gray-200 rounded-lg px-3 py-2 text-sm text-gray-600 focus:outline-none focus:border-violet-500">
              <optgroup label="国内模型" id="cnModels">
                <option>文心一言</option>
                <option>通义千问</option>
                <option>智谱清言</option>
                <option>讯飞星火</option>
              </optgroup>
              <optgroup label="International" id="enModels">
                <option>GPT-4o</option>
                <option>Claude 3.5 Sonnet</option>
                <option>Gemini Pro</option>
                <option>Llama 3</option>
              </optgroup>
            </select>
          </div>
          
          <!-- 生成数量（图片时显示） -->
          <div id="imageCount" class="hidden items-center gap-2">
            <span class="text-sm text-gray-500" data-i18n="model.count">生成数量：</span>
            <select class="bg-white border border-gray-200 rounded-lg px-3 py-2 text-sm text-gray-600 focus:outline-none focus:border-violet-500">
              <option data-i18n="count.1">1张</option>
              <option data-i18n="count.2">2张</option>
              <option data-i18n="count.4">4张</option>
            </select>
          </div>
        </div>
        
        <!-- 11. 输出结果预览区 -->
        <div class="mb-6">
          <h3 class="text-sm font-medium text-gray-600 mb-3" data-i18n="preview.title">预览</h3>
          
          <div class="output-card rounded-xl p-5 min-h-[200px] shadow-sm">
            <!-- 图片预览 -->
            <div id="imagePreview" class="hidden grid grid-cols-2 gap-4">
              <div class="aspect-square bg-gray-100 rounded-lg flex items-center justify-center">
                <span class="text-gray-400 text-sm" data-i18n="result.image1">图片 1</span>
              </div>
              <div class="aspect-square bg-gray-100 rounded-lg flex items-center justify-center">
                <span class="text-gray-400 text-sm" data-i18n="result.image2">图片 2</span>
              </div>
            </div>
            
            <!-- 视频预览 -->
            <div id="videoPreview" class="hidden">
              <div class="aspect-video bg-gray-100 rounded-lg flex items-center justify-center">
                <span class="text-gray-400 text-sm" data-i18n="result.video">视频预览区</span>
              </div>
            </div>
            
            <!-- 文本预览 -->
            <div id="textPreview" class="text-gray-600 text-sm leading-relaxed">
              <p class="text-gray-400" data-i18n="preview.waiting">预览结果将显示在这里...</p>
            </div>
          </div>
        </div>
        
      </div>
      
    </main>
    
  </div>

  <script>
    // 国际化文本
    const i18n = {
      zh: {
        'nav.home': '首页',
        'nav.pricing': '定价',
        'nav.about': '关于',
        'nav.login': '登录',
        'nav.register': '注册',
        'nav.tools': '分析工具',
        'nav.document': '文档分析',
        'nav.image': '图片分析',
        'nav.video': '视频分析',
        'nav.website': '网页分析',
        'nav.personal': '个人中心',
        'nav.history': '历史记录',
        'nav.settings': '设置',
        'user.name': '用户名',
        'user.type': '免费用户',
        'slogan.main': '最好的学习从模仿开始',
        'slogan.sub': '上传你喜欢的内容，提炼有效提示词，让美好可以复刻迭代',
        'category.document': '📄 文档',
        'category.image': '🖼️ 图片',
        'category.video': '🎬 视频',
        'category.website': '🌐 网页',
        'upload.drag': '拖放文件到此处',
        'upload.hint.document': '支持 Word/PDF/TXT/Markdown',
        'upload.hint.image': '支持 JPG/PNG/WebP/GIF',
        'upload.hint.video': '支持 MP4/MOV，≤30秒',
        'upload.hint.website': '支持 URL/网页截图',
        'upload.select': '📁 选择文件上传',
        'upload.analyze': '🔍 开始分析提炼',
        'output.title': '希望输出的内容（可多选）',
        'result.title': '输出结果',
        'result.copy': '一键复制',
        'result.waiting': '分析结果将显示在这里...',
        'result.image1': '图片 1',
        'result.image2': '图片 2',
        'result.video': '视频预览区',
        'editor.title': '编辑修改（可选）',
        'editor.placeholder': '在这里修改提示词或添加你的想法...',
        'editor.preview': '🎲 模拟输出预览',
        'model.label': '模型：',
        'model.count': '生成数量：',
        'count.1': '1张',
        'count.2': '2张',
        'count.4': '4张',
        'preview.title': '预览',
        'preview.waiting': '预览结果将显示在这里...'
      },
      en: {
        'nav.home': 'Home',
        'nav.pricing': 'Pricing',
        'nav.about': 'About',
        'nav.login': 'Login',
        'nav.register': 'Sign Up',
        'nav.tools': 'Analysis Tools',
        'nav.document': 'Document',
        'nav.image': 'Image',
        'nav.video': 'Video',
        'nav.website': 'Website',
        'nav.personal': 'Personal',
        'nav.history': 'History',
        'nav.settings': 'Settings',
        'user.name': 'Username',
        'user.type': 'Free User',
        'slogan.main': 'Best Learning Starts from Imitation',
        'slogan.sub': 'Upload content you like, extract effective prompts, make beauty replicable',
        'category.document': '📄 Document',
        'category.image': '🖼️ Image',
        'category.video': '🎬 Video',
        'category.website': '🌐 Website',
        'upload.drag': 'Drag and drop files here',
        'upload.hint.document': 'Supports Word/PDF/TXT/Markdown',
        'upload.hint.image': 'Supports JPG/PNG/WebP/GIF',
        'upload.hint.video': 'Supports MP4/MOV, ≤30s',
        'upload.hint.website': 'Supports URL/Screenshot',
        'upload.select': '📁 Select File',
        'upload.analyze': '🔍 Start Analysis',
        'output.title': 'Output Options (Multi-select)',
        'result.title': 'Output Results',
        'result.copy': 'Copy All',
        'result.waiting': 'Results will appear here...',
        'result.image1': 'Image 1',
        'result.image2': 'Image 2',
        'result.video': 'Video Preview',
        'editor.title': 'Edit (Optional)',
        'editor.placeholder': 'Modify prompts or add your ideas here...',
        'editor.preview': '🎲 Preview Output',
        'model.label': 'Model:',
        'model.count': 'Count:',
        'count.1': '1 image',
        'count.2': '2 images',
        'count.4': '4 images',
        'preview.title': 'Preview',
        'preview.waiting': 'Preview results will appear here...'
      }
    };
    
    let currentLang = 'zh';
    let currentType = 'document';
    
    // 语言切换
    document.querySelectorAll('.lang-btn').forEach(btn => {
      btn.addEventListener('click', function() {
        document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        currentLang = this.dataset.lang;
        updateLanguage();
      });
    });
    
    function updateLanguage() {
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.dataset.i18n;
        if (i18n[currentLang][key]) {
          el.textContent = i18n[currentLang][key];
        }
      });
      
      document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
        const key = el.dataset.i18nPlaceholder;
        if (i18n[currentLang][key]) {
          el.placeholder = i18n[currentLang][key];
        }
      });
      
      const hintKey = `upload.hint.${currentType}`;
      document.getElementById('fileHint').textContent = i18n[currentLang][hintKey];
      
      const modelSelect = document.getElementById('modelSelect');
      if (currentLang === 'en') {
        modelSelect.value = 'GPT-4o';
      } else {
        modelSelect.value = '文心一言';
      }
    }
    
    // 类别切换
    const categoryBtns = document.querySelectorAll('.category-btn');
    const optionGroups = {
      document: 'documentOptions',
      image: 'imageOptions',
      video: 'videoOptions',
      website: 'websiteOptions'
    };
    
    categoryBtns.forEach(btn => {
      btn.addEventListener('click', function() {
        categoryBtns.forEach(b => {
          b.classList.remove('bg-white', 'text-gray-800', 'border-violet-500', 'shadow-sm');
          b.classList.add('text-gray-500', 'border-gray-200');
        });
        this.classList.remove('text-gray-500', 'border-gray-200');
        this.classList.add('bg-white', 'text-gray-800', 'border-violet-500', 'shadow-sm');
        
        currentType = this.dataset.type;
        
        Object.values(optionGroups).forEach(id => {
          document.getElementById(id).classList.add('hidden');
        });
        document.getElementById(optionGroups[currentType]).classList.remove('hidden');
        
        const hintKey = `upload.hint.${currentType}`;
        document.getElementById('fileHint').textContent = i18n[currentLang][hintKey];
        
        document.getElementById('imagePreview').classList.add('hidden');
        document.getElementById('videoPreview').classList.add('hidden');
        document.getElementById('textPreview').classList.add('hidden');
        document.getElementById('imageCount').classList.add('hidden');
        document.getElementById('imageCount').classList.remove('flex');
        
        if (currentType === 'image') {
          document.getElementById('imagePreview').classList.remove('hidden');
          document.getElementById('imageCount').classList.remove('hidden');
          document.getElementById('imageCount').classList.add('flex');
        } else if (currentType === 'video') {
          document.getElementById('videoPreview').classList.remove('hidden');
        } else {
          document.getElementById('textPreview').classList.remove('hidden');
        }
      });
    });
    
    // 复选框状态
    document.querySelectorAll('.checkbox-item').forEach(item => {
      item.addEventListener('click', function() {
        const checkbox = this.querySelector('input[type="checkbox"]');
        checkbox.checked = !checkbox.checked;
        this.classList.toggle('checked', checkbox.checked);
      });
    });
    
    // 一键复制
    document.getElementById('copyBtn').addEventListener('click', function() {
      const outputArea = document.getElementById('outputArea');
      navigator.clipboard.writeText(outputArea.innerText).then(() => {
        const originalText = this.innerHTML;
        this.innerHTML = '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg><span>' + (currentLang === 'zh' ? '已复制' : 'Copied') + '</span>';
        this.classList.remove('text-violet-500');
        this.classList.add('text-green-500');
        setTimeout(() => {
          this.innerHTML = originalText;
          this.classList.remove('text-green-500');
          this.classList.add('text-violet-500');
        }, 2000);
      });
    });
  </script>

</body>
</html>
