<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MediaPrompt AI - 定价</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif; }
    
    body {
      background: rgba(248, 249, 250, 0.8);
    }
    
    .btn-primary {
      background: #6366f1;
    }
    .btn-primary:hover {
      background: #4f46e5;
    }
    
    .card {
      background: rgba(255, 255, 255, 0.8);
      border: 1px solid rgba(0, 0, 0, 0.06);
    }
    
    .plan-card {
      background: rgba(255, 255, 255, 0.8);
      border: 1px solid rgba(0, 0, 0, 0.06);
    }
    .plan-card:hover {
      border-color: rgba(0, 0, 0, 0.1);
    }
    .plan-card.popular {
      border-color: #6366f1;
    }
  </style>
</head>
<body class="bg-gray-50/80">
  
  <!-- 顶部导航 -->
  <nav class="bg-white/80 border-b border-gray-200/50">
    <div class="max-w-5xl mx-auto px-6 h-14 flex items-center justify-between">
      <div class="flex items-center gap-2">
        <div class="w-7 h-7 rounded bg-gray-900 flex items-center justify-center">
          <span class="text-white text-xs font-medium">M</span>
        </div>
        <span class="text-sm font-medium text-gray-900">MediaPrompt</span>
      </div>
      <div class="flex items-center gap-4">
        <a href="index-v9.html" class="text-sm text-gray-600 hover:text-gray-900">首页</a>
        <a href="dashboard.html" class="text-sm text-gray-600 hover:text-gray-900">工作台</a>
        <button class="btn-primary px-4 py-1.5 rounded text-sm text-white">
          登录
        </button>
      </div>
    </div>
  </nav>

  <!-- 主内容 -->
  <main class="pt-16 pb-16">
    <div class="max-w-5xl mx-auto px-6">
      
      <!-- 标题 -->
      <div class="text-center mb-10">
        <h1 class="text-2xl font-medium text-gray-900 mb-2">选择方案</h1>
        <p class="text-sm text-gray-500">所有方案包含：文字、图片、视频、网页四种分析</p>
      </div>
      
      <!-- 定价卡片 -->
      <div class="grid grid-cols-4 gap-4">
        
        <!-- Free -->
        <div class="plan-card rounded-xl p-5">
          <h3 class="font-medium text-gray-900 mb-0.5">免费版</h3>
          <p class="text-xs text-gray-500 mb-4">Free</p>
          <div class="mb-5">
            <span class="text-2xl font-medium text-gray-900">¥0</span>
          </div>
          <div class="space-y-2 text-xs text-gray-600 mb-5">
            <div class="flex items-center gap-2">
              <span class="text-gray-400">·</span>
              <span>每天 3 次</span>
            </div>
            <div class="flex items-center gap-2">
              <span class="text-gray-400">·</span>
              <span>基础提示词</span>
            </div>
            <div class="flex items-center gap-2">
              <span class="text-gray-400">·</span>
              <span>无需绑定支付</span>
            </div>
          </div>
          <button class="w-full py-2 border border-gray-300 rounded text-sm text-gray-700 hover:bg-gray-50">
            免费开始
          </button>
        </div>
        
        <!-- Starter -->
        <div class="plan-card rounded-xl p-5">
          <h3 class="font-medium text-gray-900 mb-0.5">入门版</h3>
          <p class="text-xs text-gray-500 mb-4">Starter</p>
          <div class="mb-5">
            <span class="text-2xl font-medium text-gray-900">¥39</span>
            <span class="text-xs text-gray-500">/月</span>
          </div>
          <div class="space-y-2 text-xs text-gray-600 mb-5">
            <div class="flex items-center gap-2">
              <span class="text-gray-400">·</span>
              <span>每天 20 次</span>
            </div>
            <div class="flex items-center gap-2">
              <span class="text-gray-400">·</span>
              <span>完整提示词</span>
            </div>
            <div class="flex items-center gap-2">
              <span class="text-gray-400">·</span>
              <span>30 天历史</span>
            </div>
          </div>
          <button class="btn-primary w-full py-2 rounded text-sm text-white">
            选择
          </button>
        </div>
        
        <!-- Pro -->
        <div class="plan-card popular rounded-xl p-5 relative">
          <div class="absolute -top-2 left-1/2 -translate-x-1/2">
            <span class="bg-gray-900 text-white text-xs px-2 py-0.5 rounded">推荐</span>
          </div>
          <h3 class="font-medium text-gray-900 mb-0.5">专业版</h3>
          <p class="text-xs text-gray-500 mb-4">Pro</p>
          <div class="mb-5">
            <span class="text-2xl font-medium text-gray-900">¥99</span>
            <span class="text-xs text-gray-500">/月</span>
          </div>
          <div class="space-y-2 text-xs text-gray-600 mb-5">
            <div class="flex items-center gap-2">
              <span class="text-gray-400">·</span>
              <span>每天 100 次</span>
            </div>
            <div class="flex items-center gap-2">
              <span class="text-gray-400">·</span>
              <span>提示词 + 代码</span>
            </div>
            <div class="flex items-center gap-2">
              <span class="text-gray-400">·</span>
              <span>网页浮层标注</span>
            </div>
            <div class="flex items-center gap-2">
              <span class="text-gray-400">·</span>
              <span>无限历史</span>
            </div>
          </div>
          <button class="btn-primary w-full py-2 rounded text-sm text-white">
            选择
          </button>
        </div>
        
        <!-- Enterprise -->
        <div class="plan-card rounded-xl p-5">
          <h3 class="font-medium text-gray-900 mb-0.5">企业版</h3>
          <p class="text-xs text-gray-500 mb-4">Enterprise</p>
          <div class="mb-5">
            <span class="text-2xl font-medium text-gray-900">¥399</span>
            <span class="text-xs text-gray-500">/月</span>
          </div>
          <div class="space-y-2 text-xs text-gray-600 mb-5">
            <div class="flex items-center gap-2">
              <span class="text-gray-400">·</span>
              <span>无限次</span>
            </div>
            <div class="flex items-center gap-2">
              <span class="text-gray-400">·</span>
              <span>API 调用</span>
            </div>
            <div class="flex items-center gap-2">
              <span class="text-gray-400">·</span>
              <span>团队协作</span>
            </div>
            <div class="flex items-center gap-2">
              <span class="text-gray-400">·</span>
              <span>专属客服</span>
            </div>
          </div>
          <button class="w-full py-2 border border-gray-300 rounded text-sm text-gray-700 hover:bg-gray-50">
            联系销售
          </button>
        </div>
        
      </div>
      
    </div>
  </main>

  <!-- 底部 -->
  <footer class="py-6">
    <div class="max-w-5xl mx-auto px-6 flex items-center justify-center gap-6 text-xs text-gray-400">
      <span>© 2026 MediaPrompt</span>
      <a href="#" class="hover:text-gray-600">隐私</a>
      <a href="#" class="hover:text-gray-600">条款</a>
    </div>
  </footer>

</body>
</html>
