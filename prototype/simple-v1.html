<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MediaPrompt AI - 简单测试版</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #f5f5f7; font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif; }
    .btn { padding: 8px 16px; border-radius: 8px; cursor: pointer; transition: all 0.2s; }
    .btn-primary { background: #52525b; color: white; }
    .btn-primary:hover { background: #3f3f46; }
    .btn-secondary { background: white; border: 1px solid #d1d1d6; }
    .btn-secondary:hover { background: #f5f5f7; }
  </style>
</head>
<body class="p-8 max-w-2xl mx-auto">
  <h1 class="text-2xl font-bold mb-6">MediaPrompt AI - 按钮测试</h1>
  
  <!-- 语言切换 -->
  <div class="mb-6 p-4 bg-white rounded-xl shadow">
    <h2 class="text-lg font-semibold mb-3">1. 语言切换</h2>
    <div class="flex gap-2">
      <button id="btnZh" class="btn bg-gray-800 text-white" onclick="setLang('zh')">中文</button>
      <button id="btnEn" class="btn btn-secondary" onclick="setLang('en')">EN</button>
    </div>
    <p id="langStatus" class="mt-2 text-sm text-gray-600">当前: 中文</p>
  </div>
  
  <!-- 类别切换 -->
  <div class="mb-6 p-4 bg-white rounded-xl shadow">
    <h2 class="text-lg font-semibold mb-3">2. 类别选择</h2>
    <div class="flex gap-2 mb-3">
      <button id="btnDoc" class="btn bg-white border border-gray-600 shadow" onclick="setCategory('document')">文档</button>
      <button id="btnImg" class="btn btn-secondary" onclick="setCategory('image')">图片</button>
      <button id="btnVid" class="btn btn-secondary" onclick="setCategory('video')">视频</button>
    </div>
    <p id="catStatus" class="text-sm text-gray-600">当前类别: 文档</p>
    
    <!-- 视频专属区域 -->
    <div id="videoSection" class="hidden mt-3 p-3 bg-amber-50 border border-amber-200 rounded-lg">
      <p class="text-sm font-medium">🎬 视频专属选项</p>
      <p class="text-xs text-gray-500 mt-1">📐 视频尺寸: 16:9</p>
      <input type="text" id="voiceInput" class="mt-2 w-full px-3 py-2 border border-gray-200 rounded-lg text-sm" placeholder="🎙️ 输入配音文字...">
    </div>
  </div>
  
  <!-- 社交媒体 -->
  <div class="mb-6 p-4 bg-white rounded-xl shadow">
    <h2 class="text-lg font-semibold mb-3">3. 社交媒体分享</h2>
    <div class="flex gap-3">
      <button class="w-10 h-10 rounded-full flex items-center justify-center" style="background:#07C160" onclick="share('wechat')">
        <span class="text-white text-xs">微</span>
      </button>
      <button class="w-10 h-10 rounded-full flex items-center justify-center" style="background:#000" onclick="share('douyin')">
        <span class="text-white text-xs">抖</span>
      </button>
      <button class="w-10 h-10 rounded-full flex items-center justify-center" style="background:#FF2442" onclick="share('xiaohongshu')">
        <span class="text-white text-xs">小</span>
      </button>
      <button class="w-10 h-10 rounded-full flex items-center justify-center" style="background:#E6162D" onclick="share('weibo')">
        <span class="text-white text-xs">微</span>
      </button>
    </div>
    <p id="shareStatus" class="mt-2 text-sm text-gray-600"></p>
  </div>
  
  <!-- 下载 -->
  <div class="mb-6 p-4 bg-white rounded-xl shadow">
    <h2 class="text-lg font-semibold mb-3">4. 下载</h2>
    <button class="btn bg-gray-800 text-white" onclick="download()">下载结果</button>
    <p id="downloadStatus" class="mt-2 text-sm text-gray-600"></p>
  </div>

  <script>
    let currentLang = 'zh';
    let currentType = 'document';
    
    function setLang(lang) {
      currentLang = lang;
      document.getElementById('btnZh').className = lang === 'zh' ? 'btn bg-gray-800 text-white' : 'btn btn-secondary';
      document.getElementById('btnEn').className = lang === 'en' ? 'btn bg-gray-800 text-white' : 'btn btn-secondary';
      document.getElementById('langStatus').textContent = lang === 'zh' ? '当前: 中文' : 'Current: English';
    }
    
    function setCategory(type) {
      currentType = type;
      document.getElementById('btnDoc').className = type === 'document' ? 'btn bg-white border border-gray-600 shadow' : 'btn btn-secondary';
      document.getElementById('btnImg').className = type === 'image' ? 'btn bg-white border border-gray-600 shadow' : 'btn btn-secondary';
      document.getElementById('btnVid').className = type === 'video' ? 'btn bg-white border border-gray-600 shadow' : 'btn btn-secondary';
      
      var catNames = { document: '文档', image: '图片', video: '视频' };
      document.getElementById('catStatus').textContent = '当前类别: ' + catNames[type];
      
      var videoSection = document.getElementById('videoSection');
      if (type === 'video') {
        videoSection.classList.remove('hidden');
      } else {
        videoSection.classList.add('hidden');
      }
    }
    
    function share(platform) {
      var platforms = { wechat: '微信', douyin: '抖音', xiaohongshu: '小红书', weibo: '微博' };
      document.getElementById('shareStatus').textContent = '分享到: ' + platforms[platform];
    }
    
    function download() {
      document.getElementById('downloadStatus').textContent = '下载成功!';
    }
  </script>
</body>
</html>
