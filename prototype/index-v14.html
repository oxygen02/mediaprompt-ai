<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MediaPrompt AI - Content Reverse Engineering Toolkit</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif; }
    
    body {
      background: #0f0f1a;
      min-height: 100vh;
    }
    
    .upload-zone {
      background: #1e1e2e;
      border: 2px dashed #3a3a4e;
      transition: all 0.2s ease;
    }
    .upload-zone:hover {
      border-color: #6366f1;
      background: #252538;
    }
    
    .btn-primary {
      background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
    }
    
    .btn-secondary {
      background: #252538;
      border: 1px solid #3a3a4e;
    }
    .btn-secondary:hover {
      background: #2a2a3e;
    }
    
    .checkbox-item {
      background: #1e1e2e;
      border: 1px solid #2a2a3e;
      transition: all 0.15s ease;
    }
    .checkbox-item:hover {
      border-color: #3a3a4e;
    }
    .checkbox-item.checked {
      border-color: #6366f1;
      background: rgba(99, 102, 241, 0.1);
    }
    
    .output-card {
      background: #1e1e2e;
      border: 1px solid #2a2a3e;
    }
    
    .lang-btn {
      transition: all 0.15s ease;
    }
    .lang-btn.active {
      background: #6366f1;
      color: white;
    }
    
    /* 月食动画 */
    @keyframes lunarEclipse {
      0% { 
        box-shadow: inset 0 0 0 0 rgba(0,0,0,0);
        transform: rotate(0deg);
      }
      25% { 
        box-shadow: inset 20px 0 0 0 rgba(0,0,0,0.3);
      }
      50% { 
        box-shadow: inset 35px 0 0 0 rgba(0,0,0,0.6);
      }
      75% { 
        box-shadow: inset 20px 0 0 0 rgba(0,0,0,0.3);
      }
      100% { 
        box-shadow: inset 0 0 0 0 rgba(0,0,0,0);
        transform: rotate(360deg);
      }
    }
    .moon-eclipse {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: linear-gradient(135deg, #fef3c7 0%, #fde68a 50%, #fcd34d 100%);
      animation: lunarEclipse 8s ease-in-out infinite;
      position: relative;
    }
    .moon-eclipse::before {
      content: '';
      position: absolute;
      top: 8px;
      left: 12px;
      width: 8px;
      height: 8px;
      background: rgba(0,0,0,0.1);
      border-radius: 50%;
    }
    .moon-eclipse::after {
      content: '';
      position: absolute;
      bottom: 12px;
      right: 10px;
      width: 12px;
      height: 12px;
      background: rgba(0,0,0,0.08);
      border-radius: 50%;
    }
    
    .hidden { display: none !important; }
  </style>
</head>
<body class="bg-[#0f0f1a] text-white">
  
  <!-- 1. 导航栏 -->
  <nav class="h-14 border-b border-gray-800 flex items-center justify-between px-8 bg-[#161622] sticky top-0 z-10">
    <div class="flex items-center gap-2">
      <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-violet-500 to-purple-600 flex items-center justify-center">
        <span class="text-white font-bold text-sm">M</span>
      </div>
      <span class="font-semibold text-white mr-8">MediaPrompt</span>
      <a href="#" class="text-sm text-white font-medium" data-i18n="nav.home">首页</a>
      <a href="#" class="text-sm text-gray-500 ml-4" data-i18n="nav.pricing">定价</a>
      <a href="#" class="text-sm text-gray-500 ml-4" data-i18n="nav.about">关于</a>
    </div>
    <div class="flex items-center gap-4">
      <!-- 语言切换 -->
      <div class="flex items-center gap-1 bg-[#252538] rounded-lg p-1">
        <button class="lang-btn active px-3 py-1 rounded text-xs font-medium" data-lang="zh">中文</button>
        <button class="lang-btn px-3 py-1 rounded text-xs text-gray-400" data-lang="en">EN</button>
      </div>
      <button class="text-sm text-gray-400 hover:text-white" data-i18n="nav.login">登录</button>
      <button class="btn-primary px-4 py-1.5 rounded text-sm text-white" data-i18n="nav.register">注册</button>
    </div>
  </nav>

  <div class="max-w-4xl mx-auto px-8 py-10">
    
    <!-- 2. Slogan - 月食动画 -->
    <div class="text-center mb-6">
      <div class="flex items-center justify-center gap-4 mb-4">
        <div class="moon-eclipse"></div>
        <h1 class="text-3xl font-bold text-white" data-i18n="slogan.main">最好的学习从模仿开始</h1>
      </div>
      <!-- 3. 小Slogan -->
      <p class="text-gray-400 text-base" data-i18n="slogan.sub">上传你喜欢的内容，提炼有效提示词，让美好可以复刻迭代</p>
    </div>
    
    <!-- 4. 类别选择 -->
    <div class="flex gap-3 mb-6 justify-center">
      <button class="category-btn px-5 py-2 rounded-lg text-sm font-medium bg-[#252538] text-white border border-violet-500" data-type="document">
        <span data-i18n="category.document">📄 文档</span>
      </button>
      <button class="category-btn px-5 py-2 rounded-lg text-sm text-gray-400 bg-[#1e1e2e] hover:bg-[#252538]" data-type="image">
        <span data-i18n="category.image">🖼️ 图片</span>
      </button>
      <button class="category-btn px-5 py-2 rounded-lg text-sm text-gray-400 bg-[#1e1e2e] hover:bg-[#252538]" data-type="video">
        <span data-i18n="category.video">🎬 视频</span>
      </button>
      <button class="category-btn px-5 py-2 rounded-lg text-sm text-gray-400 bg-[#1e1e2e] hover:bg-[#252538]" data-type="website">
        <span data-i18n="category.website">🌐 网页</span>
      </button>
    </div>
    
    <!-- 5. 文件拖拽区 -->
    <div class="upload-zone rounded-xl p-8 text-center cursor-pointer mb-4" id="uploadZone">
      <div class="w-14 h-14 rounded-full bg-[#252538] flex items-center justify-center mx-auto mb-3">
        <svg class="w-7 h-7 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/>
        </svg>
      </div>
      <p class="text-gray-300 mb-1" data-i18n="upload.drag">拖放文件到此处</p>
      <p class="text-gray-500 text-sm" id="fileHint" data-i18n="upload.hint.document">支持 Word/PDF/TXT/Markdown</p>
    </div>
    
    <!-- 6. 文件上传区 + 开始分析按钮（并列） -->
    <div class="flex gap-3 mb-8">
      <input type="file" id="fileInput" class="hidden">
      <button onclick="document.getElementById('fileInput').click()" class="btn-secondary flex-1 py-3 rounded-xl text-sm text-gray-300 font-medium">
        <span data-i18n="upload.select">📁 选择文件上传</span>
      </button>
      <button class="btn-primary px-8 py-3 rounded-xl text-white font-medium" id="analyzeBtn">
        <span data-i18n="upload.analyze">🔍 开始分析提炼</span>
      </button>
    </div>
    
    <!-- 7. 输出结果选择区域 -->
    <div class="mb-6">
      <h3 class="text-sm font-medium text-gray-300 mb-3" data-i18n="output.title">希望输出的内容（可多选）</h3>
      
      <!-- 文档选项 -->
      <div id="documentOptions" class="grid grid-cols-4 gap-3">
        <label class="checkbox-item checked rounded-lg p-3 cursor-pointer flex items-center gap-2">
          <input type="checkbox" checked class="w-4 h-4 rounded bg-gray-700 border-gray-600 text-violet-500">
          <span class="text-sm text-gray-300" data-i18n="doc.prompt">提示词</span>
        </label>
        <label class="checkbox-item rounded-lg p-3 cursor-pointer flex items-center gap-2">
          <input type="checkbox" class="w-4 h-4 rounded bg-gray-700 border-gray-600 text-violet-500">
          <span class="text-sm text-gray-300" data-i18n="doc.outline">大纲梗概</span>
        </label>
        <label class="checkbox-item rounded-lg p-3 cursor-pointer flex items-center gap-2">
          <input type="checkbox" class="w-4 h-4 rounded bg-gray-700 border-gray-600 text-violet-500">
          <span class="text-sm text-gray-300" data-i18n="doc.structure">结构分析</span>
        </label>
        <label class="checkbox-item rounded-lg p-3 cursor-pointer flex items-center gap-2">
          <input type="checkbox" class="w-4 h-4 rounded bg-gray-700 border-gray-600 text-violet-500">
          <span class="text-sm text-gray-300" data-i18n="doc.characters">人物关系</span>
        </label>
        <label class="checkbox-item rounded-lg p-3 cursor-pointer flex items-center gap-2">
          <input type="checkbox" class="w-4 h-4 rounded bg-gray-700 border-gray-600 text-violet-500">
          <span class="text-sm text-gray-300" data-i18n="doc.keywords">关键词提取</span>
        </label>
        <label class="checkbox-item rounded-lg p-3 cursor-pointer flex items-center gap-2">
          <input type="checkbox" class="w-4 h-4 rounded bg-gray-700 border-gray-600 text-violet-500">
          <span class="text-sm text-gray-300" data-i18n="doc.style">风格分析</span>
        </label>
        <label class="checkbox-item rounded-lg p-3 cursor-pointer flex items-center gap-2">
          <input type="checkbox" class="w-4 h-4 rounded bg-gray-700 border-gray-600 text-violet-500">
          <span class="text-sm text-gray-300" data-i18n="doc.tone">情感基调</span>
        </label>
        <label class="checkbox-item rounded-lg p-3 cursor-pointer flex items-center gap-2">
          <input type="checkbox" class="w-4 h-4 rounded bg-gray-700 border-gray-600 text-violet-500">
          <span class="text-sm text-gray-300" data-i18n="doc.variants">改编方案</span>
        </label>
      </div>
      
      <!-- 图片选项 -->
      <div id="imageOptions" class="hidden grid grid-cols-4 gap-3">
        <label class="checkbox-item checked rounded-lg p-3 cursor-pointer flex items-center gap-2">
          <input type="checkbox" checked class="w-4 h-4 rounded bg-gray-700 border-gray-600 text-violet-500">
          <span class="text-sm text-gray-300" data-i18n="img.prompt">提示词</span>
        </label>
        <label class="checkbox-item rounded-lg p-3 cursor-pointer flex items-center gap-2">
          <input type="checkbox" class="w-4 h-4 rounded bg-gray-700 border-gray-600 text-violet-500">
          <span class="text-sm text-gray-300" data-i18n="img.style">风格描述</span>
        </label>
        <label class="checkbox-item rounded-lg p-3 cursor-pointer flex items-center gap-2">
          <input type="checkbox" class="w-4 h-4 rounded bg-gray-700 border-gray-600 text-violet-500">
          <span class="text-sm text-gray-300" data-i18n="img.colors">配色方案</span>
        </label>
        <label class="checkbox-item rounded-lg p-3 cursor-pointer flex items-center gap-2">
          <input type="checkbox" class="w-4 h-4 rounded bg-gray-700 border-gray-600 text-violet-500">
          <span class="text-sm text-gray-300" data-i18n="img.composition">构图分析</span>
        </label>
        <label class="checkbox-item rounded-lg p-3 cursor-pointer flex items-center gap-2">
          <input type="checkbox" class="w-4 h-4 rounded bg-gray-700 border-gray-600 text-violet-500">
          <span class="text-sm text-gray-300" data-i18n="img.tools">推荐工具</span>
        </label>
        <label class="checkbox-item rounded-lg p-3 cursor-pointer flex items-center gap-2">
          <input type="checkbox" class="w-4 h-4 rounded bg-gray-700 border-gray-600 text-violet-500">
          <span class="text-sm text-gray-300" data-i18n="img.params">参数建议</span>
        </label>
        <label class="checkbox-item rounded-lg p-3 cursor-pointer flex items-center gap-2">
          <input type="checkbox" class="w-4 h-4 rounded bg-gray-700 border-gray-600 text-violet-500">
          <span class="text-sm text-gray-300" data-i18n="img.similar">相似参考</span>
        </label>
      </div>
      
      <!-- 视频选项 -->
      <div id="videoOptions" class="hidden grid grid-cols-4 gap-3">
        <label class="checkbox-item checked rounded-lg p-3 cursor-pointer flex items-center gap-2">
          <input type="checkbox" checked class="w-4 h-4 rounded bg-gray-700 border-gray-600 text-violet-500">
          <span class="text-sm text-gray-300" data-i18n="vid.prompt">提示词</span>
        </label>
        <label class="checkbox-item rounded-lg p-3 cursor-pointer flex items-center gap-2">
          <input type="checkbox" class="w-4 h-4 rounded bg-gray-700 border-gray-600 text-violet-500">
          <span class="text-sm text-gray-300" data-i18n="vid.keywords">关键词</span>
        </label>
        <label class="checkbox-item rounded-lg p-3 cursor-pointer flex items-center gap-2">
          <input type="checkbox" class="w-4 h-4 rounded bg-gray-700 border-gray-600 text-violet-500">
          <span class="text-sm text-gray-300" data-i18n="vid.variants">改编方案</span>
        </label>
        <label class="checkbox-item rounded-lg p-3 cursor-pointer flex items-center gap-2">
          <input type="checkbox" class="w-4 h-4 rounded bg-gray-700 border-gray-600 text-violet-500">
          <span class="text-sm text-gray-300" data-i18n="vid.storyboard">分镜脚本</span>
        </label>
        <label class="checkbox-item rounded-lg p-3 cursor-pointer flex items-center gap-2">
          <input type="checkbox" class="w-4 h-4 rounded bg-gray-700 border-gray-600 text-violet-500">
          <span class="text-sm text-gray-300" data-i18n="vid.pacing">节奏分析</span>
        </label>
        <label class="checkbox-item rounded-lg p-3 cursor-pointer flex items-center gap-2">
          <input type="checkbox" class="w-4 h-4 rounded bg-gray-700 border-gray-600 text-violet-500">
          <span class="text-sm text-gray-300" data-i18n="vid.effects">特效识别</span>
        </label>
        <label class="checkbox-item rounded-lg p-3 cursor-pointer flex items-center gap-2">
          <input type="checkbox" class="w-4 h-4 rounded bg-gray-700 border-gray-600 text-violet-500">
          <span class="text-sm text-gray-300" data-i18n="vid.ideas">发散方案</span>
        </label>
        <label class="checkbox-item rounded-lg p-3 cursor-pointer flex items-center gap-2">
          <input type="checkbox" class="w-4 h-4 rounded bg-gray-700 border-gray-600 text-violet-500">
          <span class="text-sm text-gray-300" data-i18n="vid.tools">推荐工具</span>
        </label>
      </div>
      
      <!-- 网页选项 -->
      <div id="websiteOptions" class="hidden grid grid-cols-4 gap-3">
        <label class="checkbox-item checked rounded-lg p-3 cursor-pointer flex items-center gap-2">
          <input type="checkbox" checked class="w-4 h-4 rounded bg-gray-700 border-gray-600 text-violet-500">
          <span class="text-sm text-gray-300" data-i18n="web.prompt">提示词</span>
        </label>
        <label class="checkbox-item rounded-lg p-3 cursor-pointer flex items-center gap-2">
          <input type="checkbox" class="w-4 h-4 rounded bg-gray-700 border-gray-600 text-violet-500">
          <span class="text-sm text-gray-300" data-i18n="web.content">内容分析</span>
        </label>
        <label class="checkbox-item rounded-lg p-3 cursor-pointer flex items-center gap-2">
          <input type="checkbox" class="w-4 h-4 rounded bg-gray-700 border-gray-600 text-violet-500">
          <span class="text-sm text-gray-300" data-i18n="web.features">功能列表</span>
        </label>
        <label class="checkbox-item rounded-lg p-3 cursor-pointer flex items-center gap-2">
          <input type="checkbox" class="w-4 h-4 rounded bg-gray-700 border-gray-600 text-violet-500">
          <span class="text-sm text-gray-300" data-i18n="web.layout">布局结构</span>
        </label>
        <label class="checkbox-item rounded-lg p-3 cursor-pointer flex items-center gap-2">
          <input type="checkbox" class="w-4 h-4 rounded bg-gray-700 border-gray-600 text-violet-500">
          <span class="text-sm text-gray-300" data-i18n="web.style">风格描述</span>
        </label>
        <label class="checkbox-item rounded-lg p-3 cursor-pointer flex items-center gap-2">
          <input type="checkbox" class="w-4 h-4 rounded bg-gray-700 border-gray-600 text-violet-500">
          <span class="text-sm text-gray-300" data-i18n="web.typography">字体配色</span>
        </label>
        <label class="checkbox-item rounded-lg p-3 cursor-pointer flex items-center gap-2">
          <input type="checkbox" class="w-4 h-4 rounded bg-gray-700 border-gray-600 text-violet-500">
          <span class="text-sm text-gray-300" data-i18n="web.mvp">MVP文档</span>
        </label>
        <label class="checkbox-item rounded-lg p-3 cursor-pointer flex items-center gap-2">
          <input type="checkbox" class="w-4 h-4 rounded bg-gray-700 border-gray-600 text-violet-500">
          <span class="text-sm text-gray-300" data-i18n="web.tech">技术栈推测</span>
        </label>
      </div>
    </div>
    
    <!-- 8. 输出结果展示区 + 一键复制 -->
    <div class="mb-6">
      <div class="flex items-center justify-between mb-3">
        <h3 class="text-sm font-medium text-gray-300" data-i18n="result.title">输出结果</h3>
        <button class="text-sm text-violet-400 hover:text-violet-300 flex items-center gap-1" id="copyBtn">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/>
          </svg>
          <span data-i18n="result.copy">一键复制</span>
        </button>
      </div>
      
      <div class="output-card rounded-xl p-5" id="outputArea">
        <p class="text-gray-400 text-sm" data-i18n="result.waiting">分析结果将显示在这里...</p>
      </div>
    </div>
    
    <!-- 9. 用户编辑区 -->
    <div class="mb-6">
      <h3 class="text-sm font-medium text-gray-300 mb-3" data-i18n="editor.title">编辑修改（可选）</h3>
      <textarea class="w-full h-32 bg-[#1e1e2e] border border-[#2a2a3e] rounded-xl p-4 text-sm text-gray-300 placeholder-gray-500 focus:outline-none focus:border-violet-500" data-i18n-placeholder="editor.placeholder" placeholder="在这里修改提示词或添加你的想法..." id="editorArea"></textarea>
    </div>
    
    <!-- 10. 模拟输出按钮 + 模型选择 + 生成数量 -->
    <div class="flex gap-3 mb-8 items-center flex-wrap">
      <button class="btn-secondary py-3 px-6 rounded-xl text-sm text-gray-300 font-medium" id="previewBtn">
        <span data-i18n="editor.preview">🎲 模拟输出预览</span>
      </button>
      
      <!-- 模型选择 -->
      <div class="flex items-center gap-2">
        <span class="text-sm text-gray-500" data-i18n="model.label">模型：</span>
        <select id="modelSelect" class="bg-[#252538] border border-[#3a3a4e] rounded-lg px-3 py-2 text-sm text-gray-300 focus:outline-none">
          <optgroup label="国内模型" id="cnModels">
            <option>文心一言</option>
            <option>通义千问</option>
            <option>智谱清言</option>
            <option>讯飞星火</option>
          </optgroup>
          <optgroup label="International" id="enModels">
            <option>GPT-4o</option>
            <option>Claude 3.5 Sonnet</option>
            <option>Gemini Pro</option>
            <option>Llama 3</option>
          </optgroup>
        </select>
      </div>
      
      <!-- 生成数量（图片时显示） -->
      <div id="imageCount" class="hidden items-center gap-2">
        <span class="text-sm text-gray-500" data-i18n="model.count">生成数量：</span>
        <select class="bg-[#252538] border border-[#3a3a4e] rounded-lg px-3 py-2 text-sm text-gray-300 focus:outline-none">
          <option data-i18n="count.1">1张</option>
          <option data-i18n="count.2">2张</option>
          <option data-i18n="count.4">4张</option>
        </select>
      </div>
    </div>
    
    <!-- 11. 输出结果预览区 -->
    <div class="mb-6">
      <h3 class="text-sm font-medium text-gray-300 mb-3" data-i18n="preview.title">预览</h3>
      
      <div class="output-card rounded-xl p-5 min-h-[200px]">
        <!-- 图片预览 -->
        <div id="imagePreview" class="hidden grid grid-cols-2 gap-4">
          <div class="aspect-square bg-[#252538] rounded-lg flex items-center justify-center">
            <span class="text-gray-500 text-sm" data-i18n="result.image1">图片 1</span>
          </div>
          <div class="aspect-square bg-[#252538] rounded-lg flex items-center justify-center">
            <span class="text-gray-500 text-sm" data-i18n="result.image2">图片 2</span>
          </div>
        </div>
        
        <!-- 视频预览 -->
        <div id="videoPreview" class="hidden">
          <div class="aspect-video bg-[#252538] rounded-lg flex items-center justify-center">
            <span class="text-gray-500 text-sm" data-i18n="result.video">视频预览区</span>
          </div>
        </div>
        
        <!-- 文本预览 -->
        <div id="textPreview" class="text-gray-300 text-sm leading-relaxed">
          <p class="text-gray-500" data-i18n="preview.waiting">预览结果将显示在这里...</p>
        </div>
      </div>
    </div>
    
  </div>

  <script>
    // 国际化文本
    const i18n = {
      zh: {
        'nav.home': '首页',
        'nav.pricing': '定价',
        'nav.about': '关于',
        'nav.login': '登录',
        'nav.register': '注册',
        'slogan.main': '最好的学习从模仿开始',
        'slogan.sub': '上传你喜欢的内容，提炼有效提示词，让美好可以复刻迭代',
        'category.document': '📄 文档',

    let currentLang = 'zh';
    let currentType = 'document';
    
    // 语言切换
    document.querySelectorAll('.lang-btn').forEach(btn => {
      btn.addEventListener('click', function() {
        document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        currentLang = this.dataset.lang;
        updateLanguage();
      });
    });
    
    function updateLanguage() {
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.dataset.i18n;
        if (i18n[currentLang][key]) {
          el.textContent = i18n[currentLang][key];
        }
      });
      
      document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
        const key = el.dataset.i18nPlaceholder;
        if (i18n[currentLang][key]) {
          el.placeholder = i18n[currentLang][key];
        }
      });
      
      // 更新文件提示
      const hintKey = `upload.hint.${currentType}`;
      document.getElementById('fileHint').textContent = i18n[currentLang][hintKey];
      
      // 更新模型选择
      const modelSelect = document.getElementById('modelSelect');
      if (currentLang === 'en') {
        modelSelect.value = 'GPT-4o';
      } else {
        modelSelect.value = '文心一言';
      }
    }
    
    // 类别切换
    const categoryBtns = document.querySelectorAll('.category-btn');
    const optionGroups = {
      document: 'documentOptions',
      image: 'imageOptions',
      video: 'videoOptions',
      website: 'websiteOptions'
    };
    
    categoryBtns.forEach(btn => {
      btn.addEventListener('click', function() {
        categoryBtns.forEach(b => {
          b.classList.remove('bg-[#252538]', 'text-white', 'border', 'border-violet-500');
          b.classList.add('bg-[#1e1e2e]', 'text-gray-400');
        });
        this.classList.remove('bg-[#1e1e2e]', 'text-gray-400');
        this.classList.add('bg-[#252538]', 'text-white', 'border', 'border-violet-500');
        
        currentType = this.dataset.type;
        
        // 切换选项组
        Object.values(optionGroups).forEach(id => {
          document.getElementById(id).classList.add('hidden');
        });
        document.getElementById(optionGroups[currentType]).classList.remove('hidden');
        
        // 更新文件提示
        const hintKey = `upload.hint.${currentType}`;
        document.getElementById('fileHint').textContent = i18n[currentLang][hintKey];
        
        // 切换预览区
        document.getElementById('imagePreview').classList.add('hidden');
        document.getElementById('videoPreview').classList.add('hidden');
        document.getElementById('textPreview').classList.add('hidden');
        document.getElementById('imageCount').classList.add('hidden');
        document.getElementById('imageCount').classList.remove('flex');
        
        if (currentType === 'image') {
          document.getElementById('imagePreview').classList.remove('hidden');
          document.getElementById('imageCount').classList.remove('hidden');
          document.getElementById('imageCount').classList.add('flex');
        } else if (currentType === 'video') {
          document.getElementById('videoPreview').classList.remove('hidden');
        } else {
          document.getElementById('textPreview').classList.remove('hidden');
        }
      });
    });
    
    // 复选框状态
    document.querySelectorAll('.checkbox-item').forEach(item => {
      item.addEventListener('click', function() {
        const checkbox = this.querySelector('input[type="checkbox"]');
        checkbox.checked = !checkbox.checked;
        this.classList.toggle('checked', checkbox.checked);
      });
    });
    
    // 一键复制
    document.getElementById('copyBtn').addEventListener('click', function() {
      const outputArea = document.getElementById('outputArea');
      navigator.clipboard.writeText(outputArea.innerText).then(() => {
        const originalText = this.innerHTML;
        this.innerHTML = '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg><span>' + (currentLang === 'zh' ? '已复制' : 'Copied') + '</span>';
        this.classList.remove('text-violet-400');
        this.classList.add('text-green-400');
        setTimeout(() => {
          this.innerHTML = originalText;
          this.classList.remove('text-green-400');
          this.classList.add('text-violet-400');
        }, 2000);
      });
    });
  </script>
