<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MediaPrompt AI - Content Reverse Engineering Toolkit</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif; }
    body { background: #f5f5f7; min-height: 100vh; }
    .sidebar { background: #ffffff; border-right: 1px solid #e5e5e5; position: fixed; top: 0; left: 0; height: 100vh; z-index: 20; }
    .main-content { margin-left: 208px; min-height: 100vh; }
    .nav-item { transition: all 0.15s ease; }
    .nav-item:hover { background: #f5f5f7; }
    .nav-item.active { background: #e8e8ed; }
    .upload-zone { background: #ffffff; border: 2px dashed #d1d1d6; transition: all 0.2s ease; }
    .upload-zone:hover { border-color: #52525b; background: #fafafa; }
    .btn-primary { background: linear-gradient(135deg, #52525b 0%, #3f3f46 50%, #52525b 100%); background-size: 200% 200%; animation: gradientShift 3s ease infinite; }
    @keyframes gradientShift { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
    .btn-secondary { background: #ffffff; border: 1px solid #d1d1d6; }
    .btn-secondary:hover { background: #f5f5f7; }
    .output-card { background: #ffffff; border: 1px solid #e5e5e5; }
    .lang-btn { transition: all 0.15s ease; }
    .lang-btn.active { background: #52525b; color: white; }
    .moon-container { position: relative; width: 32px; height: 32px; }
    .moon-base { width: 32px; height: 32px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, #e4e4e7 0%, #d4d4d8 25%, #a1a1aa 55%, #71717a 80%, #52525b 100%); position: relative; overflow: hidden; animation: moonRotate 20s linear infinite; }
    @keyframes moonRotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .moon-base::before { content: ''; position: absolute; top: 3px; left: 4px; width: 5px; height: 5px; background: rgba(0,0,0,0.12); border-radius: 50%; box-shadow: 16px 2px 0 -1px rgba(0,0,0,0.08), 20px 10px 0 -2px rgba(0,0,0,0.15), 7px 18px 0 1px rgba(0,0,0,0.1), 18px 20px 0 -1px rgba(0,0,0,0.12); }
    .moon-shadow { position: absolute; top: 0; left: 0; width: 32px; height: 32px; border-radius: 50%; pointer-events: none; animation: lunarEclipseReal 8s ease-in-out infinite; }
    @keyframes lunarEclipseReal { 0% { box-shadow: inset 0 0 0 0 rgba(15,15,26,0); } 25% { box-shadow: inset 8px 0 0 0 rgba(15,15,26,0.7); } 50% { box-shadow: inset 18px 0 0 0 rgba(15,15,26,0.95); } 75% { box-shadow: inset 8px 0 0 0 rgba(15,15,26,0.7); } 100% { box-shadow: inset 0 0 0 0 rgba(15,15,26,0); } }
    .fixed-header { position: fixed; top: 56px; left: 208px; right: 0; z-index: 25; background: #f5f5f7; padding: 12px 24px; }
    .moon-icon { width: 16px; height: 16px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, #f5f5f5 0%, #e5e5e5 40%, #d4d4d4 70%, #a3a3a3 100%); position: relative; flex-shrink: 0; }
    .moon-95 { box-shadow: inset 14px 0 0 0 rgba(20,20,25,0.9); }
    .moon-70 { box-shadow: inset 11px 0 0 0 rgba(20,20,25,0.9); }
    .moon-40 { box-shadow: inset 6px 0 0 0 rgba(20,20,25,0.9); }
    .moon-full { box-shadow: inset 2px 0 0 0 rgba(20,20,25,0.9); }
    .output-scroll::-webkit-scrollbar { width: 6px; }
    .output-scroll::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 3px; }
    .output-scroll::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 3px; }
    .logo-bg { background: linear-gradient(135deg, #52525b 0%, #3f3f46 100%); }
    .option-tag { display: inline-flex; align-items: center; gap: 6px; padding: 5px 12px; border-radius: 8px; font-size: 12px; color: #9ca3af; background: #fafafa; border: 1px solid #e5e7eb; cursor: pointer; transition: all 0.15s ease; white-space: nowrap; }
    .option-tag:hover { color: #6b7280; border-color: #d1d5db; }
    .option-tag.selected { color: #374151; font-weight: 500; background: #f3f4f6; border-color: #9ca3af; }
    .option-tag .dot { width: 10px; height: 10px; border-radius: 50%; background: transparent; border: 1.5px solid #d1d5db; transition: all 0.15s ease; flex-shrink: 0; }
    .option-tag.selected .dot { background: #52525b; border-color: #52525b; }
    .error-message { background: #fef2f2; border: 1px solid #fecaca; color: #dc2626; padding: 12px; border-radius: 8px; margin-bottom: 16px; }
    .success-message { background: #f0fdf4; border: 1px solid #bbf7d0; color: #16a34a; padding: 12px; border-radius: 8px; margin-bottom: 16px; }
    
    /* 千问风格 - AI输出面板 */
    .ai-output-panel { background: #ffffff; border: 1px solid #e5e5e5; border-radius: 12px; margin-bottom: 12px; overflow: hidden; }
    .ai-output-header { background: #fafafa; border-bottom: 1px solid #e5e5e5; padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; }
    .ai-output-title { font-size: 14px; font-weight: 500; color: #374151; display: flex; align-items: center; gap: 8px; }
    .ai-output-title .icon { width: 24px; height: 24px; background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%); border-radius: 6px; display: flex; align-items: center; justify-content: center; }
    .ai-output-title .icon svg { width: 14px; height: 14px; color: white; }
    
    /* 思考过程区域 - 千问风格 */
    .thinking-section { border-bottom: 1px solid #f0f0f0; }
    .thinking-header { padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; user-select: none; background: #fafbfc; }
    .thinking-header:hover { background: #f5f6f7; }
    .thinking-left { display: flex; align-items: center; gap: 10px; }
    .thinking-toggle { width: 20px; height: 20px; border-radius: 4px; background: #e5e7eb; display: flex; align-items: center; justify-content: center; transition: all 0.2s ease; }
    .thinking-toggle.expanded { background: #6366f1; transform: rotate(90deg); }
    .thinking-toggle svg { width: 12px; height: 12px; color: #6b7280; }
    .thinking-toggle.expanded svg { color: white; }
    .thinking-label { font-size: 13px; color: #374151; font-weight: 500; }
    .thinking-badge { background: #e0e7ff; color: #4f46e5; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 500; }
    .thinking-time { font-size: 12px; color: #9ca3af; }
    .thinking-content { padding: 0 16px 16px 46px; display: none; background: #fafbfc; }
    .thinking-content.show { display: block; }
    .thinking-text { font-size: 13px; color: #6b7280; line-height: 1.8; white-space: pre-wrap; }
    .thinking-text .step { display: block; margin-bottom: 8px; padding-left: 20px; position: relative; }
    .thinking-text .step::before { content: '▸'; position: absolute; left: 0; color: #9ca3af; }
    
    /* 结果区域 */
    .result-section { padding: 16px; }
    .result-placeholder { text-align: center; padding: 32px 20px; color: #9ca3af; font-size: 13px; background: #fafbfc; border-radius: 8px; border: 1px dashed #e5e7eb; }
    .result-placeholder .icon { font-size: 32px; margin-bottom: 8px; opacity: 0.5; }
    
    /* 结构化输出块 */
    .result-block { margin-bottom: 16px; }
    .result-block:last-child { margin-bottom: 0; }
    .result-block-title { font-size: 13px; font-weight: 600; color: #374151; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
    .result-block-title .tag { background: #f3f4f6; padding: 2px 6px; border-radius: 4px; font-size: 11px; color: #6b7280; font-weight: 400; }
    .result-block-content { background: #fafbfc; border: 1px solid #e5e7eb; border-radius: 8px; padding: 12px; font-size: 13px; color: #4b5563; line-height: 1.7; }
    .result-block-content.highlight { background: linear-gradient(135deg, #fefce8 0%, #fef9c3 100%); border-color: #fde047; }
    
    /* 打字机光标效果 */
    .typing-cursor { display: inline-block; width: 2px; height: 16px; background: #6366f1; animation: blink 0.6s infinite; vertical-align: text-bottom; margin-left: 2px; }
    @keyframes blink { 0%, 45% { opacity: 1; } 50%, 100% { opacity: 0; } }
    
    /* 视频预览区 */
    .video-preview-area { background: #000; border-radius: 8px; aspect-ratio: 9/16; max-height: 400px; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
    .video-preview-area video { max-width: 100%; max-height: 100%; }
    .video-placeholder { color: #6b7280; font-size: 12px; text-align: center; }
    .video-placeholder svg { width: 48px; height: 48px; color: #4b5563; margin-bottom: 8px; }
    
    /* 左右布局 */
    .analysis-layout { display: grid; grid-template-columns: 280px 1fr; gap: 16px; }
    @media (max-width: 768px) { .analysis-layout { grid-template-columns: 1fr; } }
    
    .hidden { display: none !important; }
  </style>
</head>
<body class="bg-[#f5f5f7] text-gray-800">
  
  <!-- 左侧固定导航栏 -->
  <aside class="sidebar w-52 flex-shrink-0 flex flex-col">
    <div class="h-14 px-4 border-b border-gray-200 flex items-center">
      <div class="w-8 h-8 rounded-lg logo-bg flex items-center justify-center"><span class="text-white font-bold text-sm">M</span></div>
      <span class="font-semibold text-gray-800 ml-2">MediaPrompt</span>
    </div>
    <nav class="flex-1 p-3 overflow-y-auto">
      <div class="text-xs text-gray-400 px-3 py-2">分析工具</div>
      <a href="#" class="nav-item active flex items-center gap-2.5 px-3 py-2.5 rounded-lg text-sm text-gray-700"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg><span>文档分析</span></a>
      <a href="#" class="nav-item flex items-center gap-2.5 px-3 py-2.5 rounded-lg text-sm text-gray-500"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg><span>图片分析</span></a>
      <a href="#" class="nav-item flex items-center gap-2.5 px-3 py-2.5 rounded-lg text-sm text-gray-500"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg><span>视频分析</span></a>
      <a href="#" class="nav-item flex items-center gap-2.5 px-3 py-2.5 rounded-lg text-sm text-gray-500"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9"/></svg><span>网页分析</span></a>
      <div class="text-xs text-gray-400 px-3 py-2 mt-4">案例展示</div>
      <a href="cases.html#video" class="nav-item flex items-center gap-2.5 px-3 py-2.5 rounded-lg text-sm text-gray-500"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg><span>视频案例</span></a>
      <div class="text-xs text-gray-400 px-3 py-2 mt-4">个人中心</div>
      <a href="#" class="nav-item flex items-center gap-2.5 px-3 py-2.5 rounded-lg text-sm text-gray-500"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg><span>历史记录</span></a>
    </nav>
    <div class="p-4 border-t border-gray-200">
      <div class="flex items-center gap-2.5">
        <div class="w-8 h-8 rounded-full bg-gray-200 flex items-center justify-center"><span class="text-xs text-gray-500">U</span></div>
        <div class="flex-1 min-w-0"><p class="text-sm text-gray-700 truncate">用户名</p><p class="text-xs text-gray-400">免费用户</p></div>
      </div>
    </div>
  </aside>

  <!-- 主内容区 -->
  <div class="main-content">
    <nav class="h-14 border-b border-gray-200 flex items-center justify-between px-8 bg-white sticky top-0 z-10">
      <div class="flex items-center gap-6">
        <a href="#" class="text-sm text-gray-800 font-medium">首页</a>
        <a href="#" class="text-sm text-gray-500">定价</a>
        <a href="#" class="text-sm text-gray-500">关于</a>
      </div>
      <div class="flex items-center gap-2.5">
        <div class="moon-container"><div class="moon-base"></div><div class="moon-shadow"></div></div>
        <h1 class="text-base font-semibold text-gray-800">最好的学习从模仿开始</h1>
      </div>
      <div class="flex items-center gap-4">
        <div class="flex items-center gap-1 bg-gray-100 rounded-lg p-1">
          <button class="lang-btn active px-3 py-1 rounded text-xs font-medium" data-lang="zh">中文</button>
          <button class="lang-btn px-3 py-1 rounded text-xs text-gray-500" data-lang="en">EN</button>
        </div>
        <button class="text-sm text-gray-500 hover:text-gray-800">登录</button>
        <button class="btn-primary px-4 py-1.5 rounded text-sm text-white">注册</button>
      </div>
    </nav>

    <!-- 固定副标题区域 -->
    <div class="fixed-header">
      <div class="max-w-5xl mx-auto">
        <div class="text-center mb-3"><p class="text-gray-500 text-sm">上传你喜欢的内容，提炼有效提示词，让美好可以复刻迭代</p></div>
        <div class="flex gap-2 justify-center">
          <button class="category-btn px-4 py-1.5 rounded-lg text-sm font-medium bg-white text-gray-800 border border-gray-600 shadow-sm flex items-center gap-2" data-type="document"><span class="moon-icon moon-95"></span><span>文档</span></button>
          <button class="category-btn px-4 py-1.5 rounded-lg text-sm text-gray-500 bg-white border border-gray-200 flex items-center gap-2" data-type="image"><span class="moon-icon moon-70"></span><span>图片</span></button>
          <button class="category-btn px-4 py-1.5 rounded-lg text-sm text-gray-500 bg-white border border-gray-200 flex items-center gap-2" data-type="video"><span class="moon-icon moon-40"></span><span>视频</span></button>
          <button class="category-btn px-4 py-1.5 rounded-lg text-sm text-gray-500 bg-white border border-gray-200 flex items-center gap-2" data-type="website"><span class="moon-icon moon-full"></span><span>网页</span></button>
        </div>
      </div>
    </div>

    <div class="p-6 max-w-5xl mx-auto pt-28">
      <div id="messageArea" class="hidden"></div>
      
      <!-- 左右布局：视频预览 + AI输出 -->
      <div class="analysis-layout">
        <!-- 左侧：视频预览区 -->
        <div class="flex flex-col gap-3">
          <div class="video-preview-area" id="videoPreviewArea">
            <div class="video-placeholder" id="videoPlaceholder">
              <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>
              <p>上传视频预览</p>
            </div>
            <video id="videoPlayer" class="hidden" controls></video>
          </div>
          
          <!-- 文件上传按钮 -->
          <input type="file" id="fileInput" class="hidden" accept="video/*,image/*,.pdf,.doc,.docx,.txt,.md">
          <button onclick="document.getElementById('fileInput').click()" class="btn-secondary py-2 rounded-lg text-sm text-gray-600 font-medium">📁 选择文件</button>
          
          <!-- 模型选择 -->
          <div class="flex items-center gap-2">
            <span class="text-xs text-gray-500">模型:</span>
            <select id="modelSelect" class="flex-1 bg-white border border-gray-200 rounded-lg px-2 py-1.5 text-xs text-gray-600">
              <option value="auto">🤖 自动</option>
              <option value="qwen3-vl-plus">千问3VL</option>
              <option value="hunyuan">混元</option>
            </select>
          </div>
          
          <button class="btn-primary py-2.5 rounded-lg text-white font-medium text-sm" id="analyzeBtn">🔍 开始分析提炼</button>
        </div>
        
        <!-- 右侧：AI输出面板 -->
        <div class="ai-output-panel">
          <div class="ai-output-header">
            <div class="ai-output-title">
              <div class="icon"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/></svg></div>
              <span>AI 分析结果</span>
            </div>
            <button class="text-sm text-gray-500 hover:text-gray-700 flex items-center gap-1" id="copyBtn">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>
              复制
            </button>
          </div>
          
          <!-- 思考过程（可折叠） -->
          <div class="thinking-section" id="thinkingSection">
            <div class="thinking-header" id="thinkingHeader">
              <div class="thinking-left">
                <div class="thinking-toggle" id="thinkingToggle">
                  <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
                </div>
                <span class="thinking-label">思考过程</span>
                <span class="thinking-badge" id="thinkingBadge">展开查看</span>
              </div>
              <span class="thinking-time" id="thinkingTime"></span>
            </div>
            <div class="thinking-content" id="thinkingContent">
              <div class="thinking-text" id="thinkingText">等待开始分析...</div>
            </div>
          </div>
          
          <!-- 结果区域 -->
          <div class="result-section output-scroll" style="max-height: 420px;">
            <div class="result-placeholder" id="resultPlaceholder">
              <div class="icon">📝</div>
              <p>上传内容后点击"开始分析提炼"</p>
              <p style="font-size: 11px; margin-top: 4px; color: #9ca3af;">AI将展示思考过程和生成结果</p>
            </div>
            <div id="resultContent" class="hidden"></div>
          </div>
        </div>
      </div>
      
      <!-- 输出选项 -->
      <div class="mt-4 mb-4 flex items-center gap-3 flex-wrap">
        <h3 class="text-sm font-medium text-gray-600">输出选项：</h3>
        <div id="documentOptions" class="flex items-center gap-1 flex-wrap">
          <span class="option-tag selected" data-value="prompt"><span class="dot"></span>提示词</span>
          <span class="option-tag" data-value="outline"><span class="dot"></span>大纲</span>
          <span class="option-tag" data-value="keywords"><span class="dot"></span>关键词</span>
        </div>
        <div id="imageOptions" class="hidden flex items-center gap-1 flex-wrap">
          <span class="option-tag selected" data-value="prompt"><span class="dot"></span>提示词</span>
          <span class="option-tag" data-value="style"><span class="dot"></span>风格</span>
          <span class="option-tag" data-value="colors"><span class="dot"></span>配色</span>
        </div>
        <div id="videoOptions" class="hidden flex items-center gap-1 flex-wrap">
          <span class="option-tag selected" data-value="prompt"><span class="dot"></span>提示词</span>
          <span class="option-tag" data-value="storyboard"><span class="dot"></span>分镜</span>
          <span class="option-tag" data-value="style"><span class="dot"></span>风格</span>
        </div>
        <div id="websiteOptions" class="hidden flex items-center gap-1 flex-wrap">
          <span class="option-tag selected" data-value="prompt"><span class="dot"></span>提示词</span>
          <span class="option-tag" data-value="features"><span class="dot"></span>功能</span>
          <span class="option-tag" data-value="tech"><span class="dot"></span>技术栈</span>
        </div>
      </div>
      
      <!-- 编辑区 -->
      <div class="mb-4">
        <h3 class="text-sm font-medium text-gray-600 mb-2">编辑修改（可选）</h3>
        <textarea class="w-full h-20 bg-white border border-gray-200 rounded-xl p-3 text-sm text-gray-600 placeholder-gray-400 focus:outline-none focus:border-gray-400" placeholder="在这里修改提示词或添加你的想法..." id="editorArea"></textarea>
      </div>
      
      <!-- 预览按钮 -->
      <div class="flex gap-3">
        <button class="btn-secondary py-2 px-4 rounded-lg text-sm text-gray-600" id="previewBtn">🎬 模拟输出预览</button>
      </div>
    </div>
  </div>

  <script>
    const API_BASE_URL = 'http://124.156.200.127:3001';
    let currentType = 'document', uploadedFile = null, thinkingStartTime = null;
    
    // 思考过程折叠
    document.getElementById('thinkingHeader').addEventListener('click', function() {
      const toggle = document.getElementById('thinkingToggle');
      const content = document.getElementById('thinkingContent');
      const badge = document.getElementById('thinkingBadge');
      toggle.classList.toggle('expanded');
      content.classList.toggle('show');
      badge.textContent = content.classList.contains('show') ? '点击收起' : '展开查看';
    });
    
    function showMessage(msg, type = 'info') {
      const area = document.getElementById('messageArea');
      area.className = type === 'error' ? 'error-message' : 'success-message';
      area.textContent = msg;
      area.classList.remove('hidden');
      setTimeout(() => area.classList.add('hidden'), 4000);
    }
    
    function updateThinking(text, append = false) {
      const el = document.getElementById('thinkingText');
      if (append) el.textContent += text;
      else el.textContent = text;
      
      // 自动展开
      const content = document.getElementById('thinkingContent');
      const toggle = document.getElementById('thinkingToggle');
      const badge = document.getElementById('thinkingBadge');
      if (!content.classList.contains('show')) {
        content.classList.add('show');
        toggle.classList.add('expanded');
        badge.textContent = '点击收起';
      }
      
      // 更新时间
      if (thinkingStartTime) {
        const elapsed = ((Date.now() - thinkingStartTime) / 1000).toFixed(1);
        document.getElementById('thinkingTime').textContent = `${elapsed}秒`;
      }
    }
    
    function showResult(blocks) {
      document.getElementById('resultPlaceholder').classList.add('hidden');
      const container = document.getElementById('resultContent');
      container.innerHTML = blocks.map(b => `
        <div class="result-block">
          <div class="result-block-title">${b.title}${b.tag ? `<span class="tag">${b.tag}</span>` : ''}</div>
          <div class="result-block-content ${b.highlight ? 'highlight' : ''}">${b.content}</div>
        </div>
      `).join('');
      container.classList.remove('hidden');
    }
    
    function getSelectedOptions() {
      const container = document.getElementById(currentType + 'Options');
      return Array.from(container.querySelectorAll('.option-tag.selected')).map(el => el.dataset.value);
    }
    
    // 打字机效果
    async function typeText(text, element, speed = 20) {
      let i = 0;
      const cursor = document.createElement('span');
      cursor.className = 'typing-cursor';
      element.appendChild(cursor);
      
      return new Promise(resolve => {
        const timer = setInterval(() => {
          if (i < text.length) {
            element.insertBefore(document.createTextNode(text[i]), cursor);
            i++;
          } else {
            clearInterval(timer);
            cursor.remove();
            resolve();
          }
        }, speed);
      });
    }
    
    async function analyzeContent() {
      if (!uploadedFile) { showMessage('请先上传文件', 'error'); return; }
      
      const btn = document.getElementById('analyzeBtn');
      btn.disabled = true;
      btn.textContent = '⏳ 分析中...';
      thinkingStartTime = Date.now();
      
      try {
        // 模拟思考过程（实际应从后端流式获取）
        const thoughts = [
          '正在解析文件格式和内容...',
          '识别到这是一个视频文件，开始提取关键帧...',
          '分析视频的整体风格和主题...',
          '提取画面中的关键元素：人物、场景、道具...',
          '分析镜头运动和转场方式...',
          '总结视频的核心表达意图和情感基调...',
          '正在生成结构化提示词...'
        ];
        
        let fullText = '';
        for (const thought of thoughts) {
          fullText += `▸ ${thought}\n`;
          updateThinking(fullText);
          await new Promise(r => setTimeout(r, 400));
        }
        
        // 调用API
        const formData = new FormData();
        formData.append('file', uploadedFile);
        formData.append('category', currentType);
        formData.append('outputOptions', JSON.stringify(getSelectedOptions()));
        
        const response = await fetch(`${API_BASE_URL}/api/analyze/file`, { method: 'POST', body: formData });
        const data = await response.json();
        
        if (data.success) {
          // 显示结果
          const elapsed = ((Date.now() - thinkingStartTime) / 1000).toFixed(1);
          document.getElementById('thinkingTime').textContent = `${elapsed}秒`;
          
          showResult([
            { title: '风格描述', tag: '视频风格', content: '温馨治愈系美食教程风格，采用俯拍和近景交替的拍摄手法，色调偏暖黄，营造家庭厨房的亲切氛围。' },
            { title: '画面元素', tag: '关键元素', content: '主角手部特写、食材展示、烹饪过程、成品呈现。背景干净简洁，突出食物的质感和色彩。' },
            { title: '镜头语言', tag: '拍摄技巧', content: '采用固定机位+微距镜头，配合柔和的自然光线，镜头节奏舒缓，每个步骤停留2-3秒便于观众理解。' },
            { title: '提示词', tag: '可直接使用', content: data.result || '一个温馨的美食烹饪教程视频，俯拍视角，展示完整的烹饪过程，食材新鲜色彩丰富，背景简洁干净，光线柔和自然，节奏舒缓治愈，适合美食博主风格。', highlight: true }
          ]);
          
          showMessage('分析完成！');
        } else {
          showMessage(data.error || '分析失败', 'error');
        }
      } catch (error) {
        console.error(error);
        showMessage('网络错误', 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = '🔍 开始分析提炼';
      }
    }
    
    // 类别切换
    const categoryBtns = document.querySelectorAll('.category-btn');
    const optionGroups = { document: 'documentOptions', image: 'imageOptions', video: 'videoOptions', website: 'websiteOptions' };
    
    categoryBtns.forEach(btn => {
      btn.addEventListener('click', function() {
        categoryBtns.forEach(b => { b.classList.remove('bg-white', 'text-gray-800', 'border-gray-600', 'shadow-sm'); b.classList.add('text-gray-500', 'border-gray-200'); });
        this.classList.remove('text-gray-500', 'border-gray-200');
        this.classList.add('bg-white', 'text-gray-800', 'border-gray-600', 'shadow-sm');
        currentType = this.dataset.type;
        Object.values(optionGroups).forEach(id => document.getElementById(id).classList.add('hidden'));
        document.getElementById(optionGroups[currentType]).classList.remove('hidden');
      });
    });
    
    // 选项切换
    document.querySelectorAll('.option-tag').forEach(tag => {
      tag.addEventListener('click', function() { this.classList.toggle('selected'); });
    });
    
    // 文件上传
    document.getElementById('fileInput').addEventListener('change', function(e) {
      if (e.target.files.length > 0) {
        uploadedFile = e.target.files[0];
        showMessage(`已选择: ${uploadedFile.name}`);
        
        // 视频预览
        if (uploadedFile.type.startsWith('video/')) {
          const video = document.getElementById('videoPlayer');
          video.src = URL.createObjectURL(uploadedFile);
          video.classList.remove('hidden');
          document.getElementById('videoPlaceholder').classList.add('hidden');
        }
      }
    });
    
    document.getElementById('analyzeBtn').addEventListener('click', analyzeContent);
    
    // 复制
    document.getElementById('copyBtn').addEventListener('click', function() {
      const text = document.getElementById('resultContent').innerText;
      if (!text) return;
      navigator.clipboard.writeText(text).then(() => {
        this.innerHTML = '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg> 已复制';
        setTimeout(() => { this.innerHTML = '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg> 复制'; }, 2000);
      });
    });
  </script>
</body>
</html>
