<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MediaPrompt AI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif; }
    
    body {
      background: rgba(248, 249, 250, 0.8);
      min-height: 100vh;
    }
    
    .btn-primary {
      background: #6366f1;
    }
    .btn-primary:hover {
      background: #4f46e5;
    }
    
    .card {
      background: rgba(255, 255, 255, 0.8);
      border: 1px solid rgba(0, 0, 0, 0.06);
    }
    
    .input-field {
      background: rgba(255, 255, 255, 0.8);
      border: 1px solid rgba(0, 0, 0, 0.08);
    }
    .input-field:focus {
      outline: none;
      border-color: #6366f1;
    }
    
    .type-btn {
      background: rgba(255, 255, 255, 0.8);
      border: 1px solid rgba(0, 0, 0, 0.08);
    }
    .type-btn.active {
      border-color: #6366f1;
      background: rgba(99, 102, 241, 0.08);
    }
    
    .upload-zone {
      background: rgba(255, 255, 255, 0.5);
      border: 1px dashed rgba(0, 0, 0, 0.15);
    }
    .upload-zone:hover {
      border-color: #6366f1;
      background: rgba(99, 102, 241, 0.04);
    }
  </style>
</head>
<body class="bg-gray-50/80">
  
  <!-- 顶部导航 -->
  <nav class="bg-white/80 border-b border-gray-200/50">
    <div class="max-w-5xl mx-auto px-6 h-14 flex items-center justify-between">
      <div class="flex items-center gap-2">
        <div class="w-7 h-7 rounded bg-gray-900 flex items-center justify-center">
          <span class="text-white text-xs font-medium">M</span>
        </div>
        <span class="text-sm font-medium text-gray-900">MediaPrompt</span>
      </div>
      <div class="flex items-center gap-4">
        <a href="pricing.html" class="text-sm text-gray-600 hover:text-gray-900">定价</a>
        <a href="dashboard.html" class="text-sm text-gray-600 hover:text-gray-900">工作台</a>
        <button class="btn-primary px-4 py-1.5 rounded text-sm text-white">
          登录
        </button>
      </div>
    </div>
  </nav>

  <!-- 主内容 -->
  <main class="pt-20 pb-16">
    <div class="max-w-md mx-auto px-6">
      
      <!-- 卡片 -->
      <div class="card rounded-xl p-6">
        
        <!-- 标题 -->
        <div class="text-center mb-6">
          <h1 class="text-xl font-medium text-gray-900 mb-1">上传文件</h1>
          <p class="text-sm text-gray-500">文字 · 图片 · 视频 · 网页</p>
        </div>
        
        <!-- 类型选择 -->
        <div class="grid grid-cols-4 gap-2 mb-5">
          <button class="type-btn active p-2.5 rounded-lg text-center">
            <span class="text-base block mb-0.5">📝</span>
            <span class="text-xs text-gray-600">文字</span>
          </button>
          <button class="type-btn p-2.5 rounded-lg text-center">
            <span class="text-base block mb-0.5">🖼️</span>
            <span class="text-xs text-gray-600">图片</span>
          </button>
          <button class="type-btn p-2.5 rounded-lg text-center">
            <span class="text-base block mb-0.5">🎬</span>
            <span class="text-xs text-gray-600">视频</span>
          </button>
          <button class="type-btn p-2.5 rounded-lg text-center">
            <span class="text-base block mb-0.5">🌐</span>
            <span class="text-xs text-gray-600">网页</span>
          </button>
        </div>
        
        <!-- 上传区域 -->
        <div class="upload-zone rounded-lg p-6 text-center cursor-pointer mb-4" id="uploadZone">
          <div class="w-10 h-10 rounded-full bg-gray-100 flex items-center justify-center mx-auto mb-2">
            <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/>
            </svg>
          </div>
          <p class="text-sm text-gray-600 mb-0.5">拖放文件或点击上传</p>
          <p class="text-xs text-gray-400" id="uploadHint">支持 Word/PDF/TXT/Markdown</p>
        </div>
        
        <!-- 分隔线 -->
        <div class="flex items-center gap-3 mb-4">
          <div class="flex-1 h-px bg-gray-200"></div>
          <span class="text-xs text-gray-400">或者</span>
          <div class="flex-1 h-px bg-gray-200"></div>
        </div>
        
        <!-- URL输入 -->
        <input 
          type="text" 
          placeholder="粘贴网页链接..." 
          class="input-field w-full px-3 py-2.5 rounded-lg text-sm text-gray-700 mb-4"
        >
        
        <!-- 主按钮 -->
        <button class="btn-primary w-full py-2.5 rounded-lg text-white text-sm font-medium mb-3">
          开始分析
        </button>
        
        <!-- 底部说明 -->
        <p class="text-center text-xs text-gray-400">
          无需信用卡 · 每天免费3次
        </p>
        
      </div>
      
    </div>
  </main>

  <!-- 底部 -->
  <footer class="py-6">
    <div class="max-w-5xl mx-auto px-6 flex items-center justify-center gap-6 text-xs text-gray-400">
      <span>© 2026 MediaPrompt</span>
      <a href="#" class="hover:text-gray-600">隐私</a>
      <a href="#" class="hover:text-gray-600">条款</a>
    </div>
  </footer>

  <script>
    const typeBtns = document.querySelectorAll('.type-btn');
    const hints = {
      text: '支持 Word/PDF/TXT/Markdown',
      image: '支持 JPG/PNG/WebP',
      video: '支持 MP4/MOV，≤30秒',
      website: '输入网页URL或截图'
    };
    
    typeBtns.forEach(btn => {
      btn.addEventListener('click', function() {
        typeBtns.forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        document.getElementById('uploadHint').textContent = hints[this.dataset.type];
      });
    });
  </script>

</body>
</html>
