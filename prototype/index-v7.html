<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MediaPrompt AI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif; }
    
    body {
      background: #ffffff;
      min-height: 100vh;
    }
    
    .hero-input {
      background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
      border: 1px solid #e9ecef;
    }
    
    .hero-input:focus {
      outline: none;
      border-color: #6366f1;
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
    }
    
    .btn-primary {
      background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
    }
    
    .type-card {
      transition: all 0.2s ease;
    }
    .type-card:hover {
      border-color: #6366f1;
    }
    
    /* 反转钟表动画 */
    @keyframes rotateReverse {
      from { transform: rotate(0deg); }
      to { transform: rotate(-360deg); }
    }
    .clock-reverse {
      animation: rotateReverse 10s linear infinite;
    }
  </style>
</head>
<body class="bg-white">
  
  <!-- 顶部导航 -->
  <nav class="fixed top-0 left-0 right-0 bg-white border-b border-gray-100 z-50">
    <div class="max-w-6xl mx-auto px-6 h-16 flex items-center justify-between">
      <div class="flex items-center gap-2">
        <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-violet-500 to-purple-600 flex items-center justify-center">
          <span class="text-white font-bold text-sm">M</span>
        </div>
        <span class="font-semibold text-gray-900">MediaPrompt</span>
      </div>
      
      <div class="flex items-center gap-6">
        <a href="#" class="text-sm text-gray-600 hover:text-gray-900">产品</a>
        <a href="#" class="text-sm text-gray-600 hover:text-gray-900">定价</a>
        <a href="#" class="text-sm text-gray-600 hover:text-gray-900">关于</a>
        <a href="#" class="text-sm text-gray-600 hover:text-gray-900">登录</a>
        <button class="btn-primary px-5 py-2.5 rounded-lg text-sm text-white font-medium">
          开始创建
        </button>
      </div>
    </div>
  </nav>

  <!-- 主内容区 -->
  <main class="pt-32 pb-20">
    <div class="max-w-4xl mx-auto px-6">
      
      <!-- 标题 -->
      <div class="text-center mb-10">
        <div class="flex items-center justify-center gap-4 mb-4">
          <!-- 反转钟表动态图 -->
          <div class="clock-reverse w-16 h-16 text-violet-500">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <circle cx="12" cy="12" r="10"/>
              <path d="M12 6v6l4 2"/>
              <circle cx="12" cy="12" r="1.5" fill="currentColor"/>
            </svg>
          </div>
          <h1 class="text-4xl font-bold text-gray-900">
            最好的学习从模仿开始
          </h1>
        </div>
        <p class="text-base text-gray-500">
          上传你喜欢的内容，提炼有效提示词，让美好可以复刻迭代
        </p>
      </div>
      
      <!-- 核心输入区 - YouWare 风格大输入框 -->
      <div class="mb-8">
        <div class="hero-input rounded-2xl p-3">
          <div class="flex gap-2">
            <select class="px-4 py-3 bg-white border border-gray-200 rounded-xl text-sm text-gray-700 focus:outline-none" id="typeSelect">
              <option value="text">📝 文字分析</option>
              <option value="image">🖼️ 图片分析</option>
              <option value="video">🎬 视频分析</option>
              <option value="website">🌐 网页分析</option>
            </select>
            <input 
              type="text" 
              id="mainInput"
              placeholder="拖放文件或粘贴链接..." 
              class="flex-1 px-4 py-3 bg-transparent text-gray-900 placeholder-gray-400 text-base focus:outline-none"
            >
            <button class="btn-primary px-8 py-3 rounded-xl text-white font-medium whitespace-nowrap">
              开始分析
            </button>
          </div>
        </div>
        <p class="text-center text-sm text-gray-400 mt-3">
          无需信用卡 · 每天免费3次
        </p>
      </div>
      
      <!-- 功能说明 - 横向一行 -->
      <div class="flex gap-6 mt-12 justify-center flex-wrap">
        <div class="text-center p-4 min-w-[140px]">
          <div class="w-12 h-12 bg-violet-100 rounded-xl flex items-center justify-center mx-auto mb-3">
            <span class="text-xl">📝</span>
          </div>
          <h3 class="font-medium text-gray-900 mb-1">文字分析</h3>
          <p class="text-xs text-gray-500">文案/小说/策划书</p>
        </div>
        <div class="text-center p-4 min-w-[140px]">
          <div class="w-12 h-12 bg-pink-100 rounded-xl flex items-center justify-center mx-auto mb-3">
            <span class="text-xl">🖼️</span>
          </div>
          <h3 class="font-medium text-gray-900 mb-1">图片分析</h3>
          <p class="text-xs text-gray-500">AI图/照片/海报</p>
        </div>
        <div class="text-center p-4 min-w-[140px]">
          <div class="w-12 h-12 bg-blue-100 rounded-xl flex items-center justify-center mx-auto mb-3">
            <span class="text-xl">🎬</span>
          </div>
          <h3 class="font-medium text-gray-900 mb-1">视频分析</h3>
          <p class="text-xs text-gray-500">短视频/广告/特效</p>
        </div>
        <div class="text-center p-4 min-w-[140px]">
          <div class="w-12 h-12 bg-green-100 rounded-xl flex items-center justify-center mx-auto mb-3">
            <span class="text-xl">🌐</span>
          </div>
          <h3 class="font-medium text-gray-900 mb-1">网页分析</h3>
          <p class="text-xs text-gray-500">URL/截图/需求</p>
        </div>
      </div>
      
    </div>
  </main>

  <!-- 底部 -->
  <footer class="py-8 border-t border-gray-100">
    <div class="max-w-6xl mx-auto px-6 flex items-center justify-between text-sm text-gray-400">
      <span>© 2026 MediaPrompt AI</span>
      <div class="flex gap-6">
        <a href="#" class="hover:text-gray-600">隐私</a>
        <a href="#" class="hover:text-gray-600">条款</a>
      </div>
    </div>
  </footer>

  <script>
    // 类型切换时更新提示
    const typeSelect = document.getElementById('typeSelect');
    const mainInput = document.getElementById('mainInput');
    const hints = {
      text: '支持 Word/PDF/TXT/Markdown，拖放或粘贴链接',
      image: '支持 JPG/PNG/WebP，拖放或粘贴图片链接',
      video: '支持 MP4/MOV，≤30秒，拖放或粘贴链接',
      website: '粘贴网页URL或上传网页截图'
    };
    
    typeSelect.addEventListener('change', function() {
      mainInput.placeholder = hints[this.value] || '拖放文件或粘贴链接...';
    });
  </script>

</body>
</html>
